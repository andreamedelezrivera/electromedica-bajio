}

async function subirCSVaDrive(accessToken,nombreArchivo,contenidoCSV){
  const boundary="emb_boundary_"+Date.now();
  const metadata={name:nombreArchivo,mimeType:"text/csv"};
  const body=
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n`+
    `--${boundary}\r\nContent-Type: text/csv\r\n\r\n${contenidoCSV}\r\n--${boundary}--`;
  const resp=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",{
    method:"POST",
    headers:{"Authorization":`Bearer ${accessToken}`,"Content-Type":`multipart/related; boundary=${boundary}`},
    body
  });
  if(!resp.ok){const t=await resp.text();throw new Error("Google Drive respondió con error: "+t);}
  return resp.json();
}
async function generarPDFOrden(orden){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:"pt",format:"letter"});
  const M=40;let y=60;
  const W=doc.internal.pageSize.getWidth();
  function linea(txt,size=11,bold=false,color="#000000"){
    doc.setFont(undefined,bold?"bold":"normal");
    doc.setFontSize(size);
    doc.setTextColor(color);
    const partes=doc.splitTextToSize(String(txt),W-M*2);
    partes.forEach(p=>{
      if(y>740){doc.addPage();y=50;}
      doc.text(p,M,y);
      y+=size*1.35;
    });
  }
  function espacio(n=10){y+=n;}
  try{doc.addImage(LOGO_DATA,"PNG",M,y-28,36,36);}catch(e){}
  doc.setFont(undefined,"bold");doc.setFontSize(16);doc.setTextColor("#1B3A6B");
  doc.text("ELECTROMÉDICA DEL BAJÍO",M+46,y-8);
  doc.setFont(undefined,"normal");doc.setFontSize(11);doc.setTextColor("#000000");
  doc.text(`Orden de Servicio #${orden.folio} — ${orden.estado}`,M+46,y+10);
  y+=40;
  linea("Cliente",13,true,"#1B3A6B");
  linea(orden.cliente_nombre||"");
  linea(`${orden.cliente_dir||""} | ${orden.cliente_ciudad||""}`);
  linea(`Tel: ${orden.cliente_tel||""}`);
  espacio(8);
  linea("Equipo",13,true,"#1B3A6B");
  linea(`${orden.equipo_tipo||""} ${orden.equipo_marca||""} ${orden.equipo_modelo||""}`.trim()||"—");
  if(orden.equipo_serie)linea(`Serie: ${orden.equipo_serie}`);
  if(orden.equipo)linea(`Equipo relacionado: ${orden.equipo}`);
  espacio(8);
  linea("Levantamiento",13,true,"#1B3A6B");
  linea(orden.lev_obs||"Sin observaciones");
  espacio(8);
  if(orden.prev_realiza!==null&&orden.prev_realiza!==undefined){
    linea("Mantenimiento Preventivo",13,true,"#1B3A6B");
    linea(orden.prev_realiza?"Realizado":"No se realizó");
    if(orden.prev_realiza){
      Object.entries(orden.prev_checklist||{}).forEach(([sec,d])=>{
        linea(sec,11,true);
        if(d.realiza===false){linea("No se realizó",9);}
        else{Object.entries(d.items||{}).forEach(([it,v])=>linea(`${v?"✓":"○"} ${it}`,9));}
      });
      if(orden.prev_comentarios)linea(`Comentarios: ${orden.prev_comentarios}`);
      if(orden.prev_proximo)linea(`Próximo mantenimiento: ${orden.prev_proximo}`);
    }
    espacio(8);
  }
  if(orden.corr_realiza!==null&&orden.corr_realiza!==undefined){
    linea("Mantenimiento Correctivo",13,true,"#1B3A6B");
    linea(orden.corr_realiza?"Realizado":"No se realizó");
    if(orden.corr_realiza){
      linea(orden.corr_descripcion||"");
      if(orden.corr_refacciones)linea(`Refacciones: ${orden.corr_refacciones}`);
    }
    espacio(8);
  }
  const fotos=comoArray(orden.fotos);
  if(fotos.length>0){
    linea("Fotos",13,true,"#1B3A6B");
    if(y>650){doc.addPage();y=50;}
    let x=M;
    fotos.slice(0,6).forEach(f=>{
      if(x+80>W-M){x=M;y+=90;}
      if(y>700){doc.addPage();y=50;x=M;}
      try{doc.addImage(f,"JPEG",x,y,80,80);}catch(e){}
      x+=90;
    });
    y+=100;
  }
  if(orden.firma_imagen||orden.firma_nombre){
    if(y>650){doc.addPage();y=50;}
    linea("Firma",13,true,"#1B3A6B");
    if(orden.firma_nombre)linea(orden.firma_nombre);
    if(orden.firma_imagen){try{doc.addImage(orden.firma_imagen,"PNG",M,y,160,70);y+=80;}catch(e){}}
  }
  espacio(14);
  const colabs=comoArray(orden.colaboradores);
  linea(`Realizado por: ${nombreU(orden.creado_por)}${colabs.length?` + ${colabs.map(id=>nombreU(id)).join(", ")}`:""}`,10);
  linea(`Fecha: ${orden.fecha_guardado?new Date(orden.fecha_guardado).toLocaleString("es-MX"):""}`,10);

  const nombreArchivo=`Orden_${orden.folio}_${(orden.cliente_nombre||"cliente").replace(/[^a-zA-Z0-9]+/g,"_")}.pdf`;
  const blob=doc.output("blob");
  if(window.showSaveFilePicker){
    try{
      const handle=await window.showSaveFilePicker({suggestedName:nombreArchivo,types:[{description:"PDF",accept:{"application/pdf":[".pdf"]}}]});
      const writable=await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return;
    }catch(e){
      if(e.name==="AbortError")return;
    }
  }
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=nombreArchivo;document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),4000);
}

function diasHasta(fechaStr){
  if(!fechaStr)return null;
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const f=new Date(fechaStr+"T00:00:00");
  if(isNaN(f))return null;
  return Math.round((f-hoy)/86400000);
}
function combinarFechaHora(fecha,hora){return new Date(`${fecha}T${hora}`);}
function citasSeTraslapan(c1,c2){
  if(c1.fecha!==c2.fecha)return false;
  const ini1=combinarFechaHora(c1.fecha,c1.hora).getTime();
  const fin1=ini1+(c1.duracion_horas*3600000)+(c1.traslado_minutos*60000);
  const ini2=combinarFechaHora(c2.fecha,c2.hora).getTime();
  const fin2=ini2+(c2.duracion_horas*3600000)+(c2.traslado_minutos*60000);
  return ini1<fin2&&ini2<fin1;
}

async function revisarEscalacionMantenimiento(usuario,mostrarPopup){
  const {data}=await sb.from("ordenes").select("*").eq("estado","completada").not("prev_proximo","is",null).is("mant_cita_id",null).or("mant_estado.is.null,mant_estado.neq.no_realiza");
  if(!data)return;
  for(const o of data){
    const dias=diasHasta(o.prev_proximo);
    if(dias===null)continue;
    let etapa=null,campo=null;
    if(dias<=14&&dias>10&&!o.mant_notif_2sem){etapa="2sem";campo="mant_notif_2sem";}
    else if(dias<=10&&dias>7&&!o.mant_notif_1_5sem){etapa="1.5sem";campo="mant_notif_1_5sem";}
    else if(dias<=7&&dias>2&&!o.mant_notif_1sem){etapa="1sem";campo="mant_notif_1sem";}
    if(!etapa)continue;
    await sb.from("ordenes").update({[campo]:true}).eq("id",o.id);
    const etiquetaEtapa=etapa==="2sem"?"en 2 semanas":etapa==="1.5sem"?"en 1.5 semanas":"en 1 semana";
    const msg=`🔧 Próximo mantenimiento de ${o.cliente_nombre} (${o.equipo_tipo}) programado ${o.prev_proximo} (${etiquetaEtapa})`;
    await sb.from("notificaciones").insert([{mensaje:msg,para_rol:"admin"},{mensaje:msg,para_usuario_id:o.creado_por}]);
    if(usuario.id===o.creado_por){mostrarPopup({orden:o,etapa});return;}
  }
}

function FirmaPad({canvasRef,onDibujar}){
  const dibujando=useRef(false);
  function pos(e){
    const canvas=canvasRef.current;
    const rect=canvas.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    return {x:(cx-rect.left)*(canvas.width/rect.width),y:(cy-rect.top)*(canvas.height/rect.height)};
  }
  function iniciar(e){
    e.preventDefault();
    dibujando.current=true;
    const {x,y}=pos(e);
    const ctx=canvasRef.current.getContext("2d");
    ctx.beginPath();ctx.moveTo(x,y);
  }
  function mover(e){
    if(!dibujando.current)return;
    e.preventDefault();
    const {x,y}=pos(e);
    const ctx=canvasRef.current.getContext("2d");
    ctx.lineTo(x,y);ctx.strokeStyle=C.marino;ctx.lineWidth=2.2;ctx.lineCap="round";ctx.lineJoin="round";ctx.stroke();
    onDibujar&&onDibujar(true);
  }
  function terminar(){dibujando.current=false;}
  function limpiar(){
    const canvas=canvasRef.current;
    canvas.getContext("2d").clearRect(0,0,canvas.width,canvas.height);
    onDibujar&&onDibujar(false);
  }
  return (
    <div>
      <canvas ref={canvasRef} width={300} height={130} style={{width:"100%",height:130,background:"#fff",border:`2px dashed ${C.borde}`,borderRadius:8,touchAction:"none",cursor:"crosshair"}}
        onMouseDown={iniciar} onMouseMove={mover} onMouseUp={terminar} onMouseLeave={terminar}
        onTouchStart={iniciar} onTouchMove={mover} onTouchEnd={terminar}/>
      <div style={{textAlign:"right",marginTop:4}}>
        <span onClick={limpiar} style={{fontSize:12,color:C.error,cursor:"pointer",fontWeight:700}}>🗑️ Limpiar firma</span>
      </div>
    </div>
  );
}

            <div style={{fontWeight:800,color:C.error,fontSize:16,marginBottom:8}}>⚠️ ¿Confirmar que no se realizará?</div>

function SecCL({sec,data,onChange}){
  const [open,setOpen]=useState(false);
  const items=getItems(sec);
  const d=data[sec]||{realiza:null,items:{}};
  const checked=Object.values(d.items).filter(Boolean).length;
  function setR(v){onChange(sec,{...d,realiza:v,items:v?d.items:{}});if(v)setOpen(true);else setOpen(false);}
  function tog(item){onChange(sec,{...d,items:{...d.items,[item]:!d.items[item]}});}
  return (
    <div style={{border:`1.5px solid ${C.borde}`,borderRadius:10,marginBottom:10,overflow:"hidden"}}>
      <div style={{background:d.realiza===false?"#F8D7DA":d.realiza?"#E8F5E9":C.gris,padding:"12px 14px"}}>
        <div style={{fontWeight:700,fontSize:13,color:C.marino,cursor:"pointer",marginBottom:8}} onClick={()=>d.realiza&&setOpen(!open)}>
          {d.realiza?open?"▼ ":"▶ ":"○ "}{sec}{d.realiza&&<span style={{fontSize:11,color:C.texto,marginLeft:6}}>({checked}/{items.length})</span>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <span onClick={()=>setR(true)} style={{padding:"4px 12px",borderRadius:12,fontSize:12,cursor:"pointer",fontWeight:700,background:d.realiza===true?C.exito:"#ddd",color:d.realiza===true?"#fff":"#555"}}>✓ Realizar</span>
          <span onClick={()=>setR(false)} style={{padding:"4px 12px",borderRadius:12,fontSize:12,cursor:"pointer",fontWeight:700,background:d.realiza===false?C.error:"#ddd",color:d.realiza===false?"#fff":"#555"}}>✗ No realizar</span>
        </div>
      </div>
      {open&&d.realiza&&(
        <div style={{padding:14}}>
          {items.map(it=>(
            <label key={it} style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10,cursor:"pointer"}}>
              <input type="checkbox" checked={!!d.items[it]} onChange={()=>tog(it)} style={{marginTop:2,width:18,height:18,accentColor:C.marino}}/>
              <span style={{fontSize:13,color:C.texto,lineHeight:1.4}}>{it}</span>
            </label>
          ))}
        </div>
      )}
    </div>
  );
}

function OrdenGeneral({usuario,onDone,onVolver,oe,setSucia,guardarBorradorRef}){
  const [folio,setFolio]=useState(oe?.folio||"");
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const guardadoOkRef=useRef(false);
  const firmaCanvasRef=useRef(null);
  const [firmaDibujada,setFirmaDibujada]=useState(!!oe?.firma_imagen);
  const [firmaTocada,setFirmaTocada]=useState(false);
  const [pendienteCliente,setPendienteCliente]=useState(null);
  const [o,setO]=useState({
    cliente_nombre:oe?.cliente_nombre||"",cliente_dir:oe?.cliente_dir||"",
    cliente_ciudad:oe?.cliente_ciudad||"",cliente_tel:oe?.cliente_tel||"",
    tipo_servicio:oe?.equipo_tipo?.replace("GENERAL: ","")||"",
    equipo:oe?.equipo||"",
    descripcion:oe?.lev_obs||"",materiales:oe?.corr_descripcion||"",
    fotos:comoArray(oe?.fotos),
    firma_nombre:oe?.firma_nombre||"",
    envio_wa:oe?.envio_wa||"",envio_email:oe?.envio_email||""
  });
  useEffect(()=>{if(!oe)sigFolio().then(setFolio);},[]);
  useEffect(()=>{
    if(oe?.firma_imagen&&firmaCanvasRef.current){
      const img=new Image();
      img.onload=()=>{firmaCanvasRef.current.getContext("2d").drawImage(img,0,0,firmaCanvasRef.current.width,firmaCanvasRef.current.height);};
      img.src=oe.firma_imagen;
    }
  },[]);
  useEffect(()=>{
    if(!oe||oe.estado==="completada")return;
    const estadoOriginal=oe.estado;
    (async()=>{await sb.from("ordenes").update({estado:"en_proceso"}).eq("id",oe.id);})();
    return ()=>{
      if(!guardadoOkRef.current){
        (async()=>{await sb.from("ordenes").update({estado:estadoOriginal}).eq("id",oe.id);})();
      }
    };
  },[]);
  function upd(k,v){setO(p=>({...p,[k]:v}));setSucia&&setSucia(true);}
  function agregarFoto(base64){setO(p=>({...p,fotos:[...(p.fotos||[]),base64]}));setSucia&&setSucia(true);}
  function quitarFoto(idx){setO(p=>({...p,fotos:(p.fotos||[]).filter((_,i)=>i!==idx)}));setSucia&&setSucia(true);}
  function manejarFotos(e){
    const files=Array.from(e.target.files||[]);
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        const img=new Image();
        img.onload=()=>{
          const maxW=800;
          const escala=Math.min(1,maxW/img.width);
          const w=Math.round(img.width*escala),h=Math.round(img.height*escala);
          const canvas=document.createElement("canvas");
          canvas.width=w;canvas.height=h;
          canvas.getContext("2d").drawImage(img,0,0,w,h);
          agregarFoto(canvas.toDataURL("image/jpeg",0.7));
        };
        img.src=ev.target.result;
      };
      reader.readAsDataURL(file);
    });
    e.target.value="";
  }
  async function guardar(estado){
    setSaving(true);
    const ubicacion=await obtenerUbicacion();
    const firma_imagen=!firmaTocada?(oe?.firma_imagen||null):(firmaDibujada&&firmaCanvasRef.current?firmaCanvasRef.current.toDataURL("image/png"):null);
    const datos={folio,estado,creado_por:usuario.id,fecha_guardado:new Date().toISOString(),ubicacion,
      cliente_nombre:o.cliente_nombre,cliente_dir:o.cliente_dir,cliente_ciudad:o.cliente_ciudad,cliente_tel:o.cliente_tel,
      equipo_tipo:`GENERAL: ${o.tipo_servicio}`,equipo:o.equipo,lev_obs:o.descripcion,corr_descripcion:o.materiales,
      fotos:o.fotos,firma_nombre:o.firma_nombre,firma_imagen,
      envio_wa:o.envio_wa,envio_email:o.envio_email};
    if(oe){
      await sb.from("ordenes").update(datos).eq("id",oe.id);
    }else{
      if(!navigator.onLine){
        agregarPendienteOffline({tipo:"general",datos});
        guardadoOkRef.current=true;
        setSaving(false);setSucia&&setSucia(false);
        alert("Sin conexión: la orden se guardó en este dispositivo y se subirá automáticamente cuando vuelva el internet.");
        onDone();
        return;
      }
      try{
        const {error}=await sb.from("ordenes").insert(datos);
        if(error)throw error;
      }catch(e){
        agregarPendienteOffline({tipo:"general",datos});
        guardadoOkRef.current=true;
        setSaving(false);setSucia&&setSucia(false);
        alert("No se pudo conectar a internet: la orden se guardó en este dispositivo y se subirá automáticamente cuando vuelva la conexión.");
        onDone();
        return;
      }
    }
    guardadoOkRef.current=true;
    await sb.from("notificaciones").insert({mensaje:`${estado==="completada"?"✅":"💾"} Orden General #${folio} — ${o.cliente_nombre||"sin cliente"}`});
    setSaving(false);
    const chequeo=await verificarClienteDirectorio(o);
    if(chequeo.tipo==="nuevo"){await crearClienteDirectorio(o);setSucia&&setSucia(false);onDone();}
    else if(chequeo.tipo==="diferente"){setPendienteCliente(chequeo);}
    else{setSucia&&setSucia(false);onDone();}
  }
  function resolverSyncCliente(actualizar){
    (async()=>{
      if(actualizar&&pendienteCliente)await actualizarClienteDirectorio(pendienteCliente.existente.id,pendienteCliente.nuevo);
      setPendienteCliente(null);setSucia&&setSucia(false);onDone();
    })();
  }
  useEffect(()=>{
    if(guardarBorradorRef)guardarBorradorRef.current=()=>guardar("borrador");
  });
  function validar(){
    if(!o.cliente_nombre||!o.cliente_dir||!o.cliente_ciudad||!o.cliente_tel||!o.tipo_servicio||!o.descripcion){setErr("Completa todos los campos obligatorios.");return false;}
    if((o.fotos||[]).length<3){setErr("Agrega al menos 3 fotos del servicio.");return false;}
    if(!o.envio_wa&&!o.envio_email){setErr("Ingresa WhatsApp o correo del cliente.");return false;}
    setErr("");return true;
  }
  return (
    <div style={{padding:"0 16px",paddingBottom:80}}>
      <button onClick={onVolver} style={{background:"transparent",border:`1.5px solid ${C.borde}`,borderRadius:8,padding:"6px 14px",fontSize:13,cursor:"pointer",margin:"12px 0 16px"}}>← Volver</button>
      <div style={{color:C.marino,fontWeight:800,fontSize:18,marginBottom:16}}>📋 Orden General #{folio}</div>
      <Card>
        <div style={{color:C.marino,fontWeight:800,fontSize:16,marginBottom:16}}>👤 Datos del Cliente</div>
        <BuscadorCliente val={o.cliente_nombre} set={v=>upd("cliente_nombre",v)} onSeleccionar={c=>{setO(p=>({...p,cliente_nombre:c.nombre,cliente_dir:c.direccion||p.cliente_dir,cliente_ciudad:c.ciudad||p.cliente_ciudad,cliente_tel:c.telefono||p.cliente_tel}));setSucia&&setSucia(true);}}/>
        <Inp lbl="Dirección" val={o.cliente_dir} set={v=>upd("cliente_dir",v)} req ph="Calle, número, colonia"/>
        <Inp lbl="Ciudad" val={o.cliente_ciudad} set={v=>upd("cliente_ciudad",v)} req ph="Ciudad, estado"/>
        <Inp lbl="Teléfono" val={o.cliente_tel} set={v=>upd("cliente_tel",v)} req ph="10 dígitos" num/>
      </Card>
      <Card>
        <div style={{color:C.marino,fontWeight:800,fontSize:16,marginBottom:16}}>🔧 Detalles del Servicio</div>
        <Inp lbl="Equipo" val={o.equipo} set={v=>upd("equipo",v)} ph="ej. Rayos X fijo sala 2, Ultrasonido Doppler..."/>
        <Inp lbl="Tipo de servicio" val={o.tipo_servicio} set={v=>upd("tipo_servicio",v)} req ph="ej. Instalación eléctrica, entrega de equipo..."/>
        <TA lbl="Descripción del trabajo realizado" val={o.descripcion} set={v=>upd("descripcion",v)} req ph="Describe detalladamente el trabajo realizado..."/>
        <TA lbl="Materiales utilizados" val={o.materiales} set={v=>upd("materiales",v)} ph="Lista los materiales o refacciones utilizadas..."/>
        <div style={{fontSize:13,color:C.texto,marginBottom:4,fontWeight:600}}>📸 Fotos del servicio <span style={{color:C.error}}>* (mínimo 3)</span></div>
        <label style={{display:"inline-block",fontSize:13,cursor:"pointer",color:"#fff",background:C.cielo,borderRadius:8,padding:"8px 16px",fontWeight:700,marginBottom:10}}>
          📷 Tomar / subir foto
          <input type="file" accept="image/*" capture="environment" multiple onChange={manejarFotos} style={{display:"none"}}/>
        </label>
        {o.fotos?.length>0&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:6}}>
            {o.fotos.map((f,i)=>(
              <div key={i} style={{position:"relative"}}>
                <img src={f} style={{width:72,height:72,objectFit:"cover",borderRadius:8,border:`1px solid ${C.borde}`}}/>
                <span onClick={()=>quitarFoto(i)} style={{position:"absolute",top:-6,right:-6,background:C.error,color:"#fff",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,cursor:"pointer",fontWeight:700}}>×</span>
              </div>

          </div>
        )}
      </Card>
      <Card style={{background:C.amarillo,border:`1px solid #F0CA00`}}>
        <div style={{fontWeight:800,color:"#7D6608",marginBottom:12}}>✍️ Firma y Envío</div>
        <Inp lbl="Nombre de quien firma" val={o.firma_nombre} set={v=>upd("firma_nombre",v)} ph="Nombre de quien recibe/firma el servicio"/>
        <div style={{marginBottom:16}}>
          <FirmaPad canvasRef={firmaCanvasRef} onDibujar={v=>{setFirmaDibujada(v);setFirmaTocada(true);setSucia&&setSucia(true);}}/>
        </div>

        <Inp lbl="✉️ Correo del cliente" val={o.envio_email} set={v=>upd("envio_email",v)} ph="correo@ejemplo.com" type="email"/>

        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <Btn ch="💾 Guardar borrador" onClick={()=>guardar("borrador")} color={C.cielo} out sm dis={saving}/>
          <Btn ch={saving?"Guardando...":"✅ Completar"} onClick={()=>{if(validar())guardar("completada");}} color={C.exito} dis={saving}/>
        </div>
      </Card>
      {pendienteCliente&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:14,padding:22,maxWidth:340,width:"100%"}}>
            <div style={{fontWeight:800,color:C.marino,fontSize:16,marginBottom:8}}>📇 Actualizar directorio de clientes</div>
            <div style={{fontSize:13,color:C.texto,marginBottom:18}}>Los datos de "{pendienteCliente.existente.nombre}" en esta orden son distintos a los del directorio. ¿Actualizar el directorio con los nuevos datos?</div>
            <Btn ch="Sí, actualizar" onClick={()=>resolverSyncCliente(true)} color={C.exito} full/>
            <Btn ch="No actualizar" onClick={()=>resolverSyncCliente(false)} color={C.texto} out full/>
          </div>
        </div>
      )}
    </div>
  );
}

        return;
      }
      try{
        const {error}=await sb.from("ordenes").insert(datos);
        if(error)throw error;
      }catch(e){
        agregarPendienteOffline({tipo:"mant",datos});
        guardadoOkRef.current=true;
        setSaving(false);setSucia&&setSucia(false);
        alert("No se pudo conectar a internet: la orden se guardó en este dispositivo y se subirá automáticamente cuando vuelva la conexión.");
        onDone();
        return;
      }
    }
    guardadoOkRef.current=true;
    await sb.from("notificaciones").insert({mensaje:`${estado==="completada"?"✅":"💾"} Orden #${folio} — ${o.cliente_nombre||"sin cliente"} | ${o.equipo_tipo}`});
    setSaving(false);
    const chequeo=await verificarClienteDirectorio(o);
    if(chequeo.tipo==="nuevo"){await crearClienteDirectorio(o);setSucia&&setSucia(false);onDone();}
    else if(chequeo.tipo==="diferente"){setPendienteCliente(chequeo);}
    else{setSucia&&setSucia(false);onDone();}
  }
  function resolverSyncCliente(actualizar){
    (async()=>{
      if(actualizar&&pendienteCliente)await actualizarClienteDirectorio(pendienteCliente.existente.id,pendienteCliente.nuevo);
      setPendienteCliente(null);setSucia&&setSucia(false);onDone();
    })();
  }
  useEffect(()=>{
    if(guardarBorradorRef)guardarBorradorRef.current=()=>guardar("borrador");

  const pasos=["Datos","Levantamiento","Preventivo","Correctivo"];
  return (
    <div style={{paddingBottom:80}}>
      <button onClick={onVolver} style={{background:"transparent",border:`1.5px solid ${C.borde}`,borderRadius:8,padding:"6px 14px",fontSize:13,cursor:"pointer",margin:"12px 16px 0"}}>← Volver</button>
      <div style={{display:"flex",background:C.gris,borderRadius:10,margin:"12px 16px",padding:4}}>
        {pasos.map((p,i)=>(
          <div key={i} onClick={()=>setPaso(i)} style={{flex:1,textAlign:"center",padding:"8px 2px",borderRadius:8,background:paso===i?C.marino:"transparent",color:paso===i?"#fff":C.texto,fontSize:11,fontWeight:700,cursor:"pointer"}}>{i+1}. {p}</div>
        ))}
      </div>
      <div style={{padding:"0 16px"}}>
        {paso===0&&(
          <div>
            <Card>
              <div style={{color:C.marino,fontWeight:800,fontSize:16,marginBottom:16}}>👤 Datos del Cliente</div>
              <BuscadorCliente val={o.cliente_nombre} set={v=>upd("cliente_nombre",v)} onSeleccionar={c=>{setO(p=>({...p,cliente_nombre:c.nombre,cliente_dir:c.direccion||p.cliente_dir,cliente_ciudad:c.ciudad||p.cliente_ciudad,cliente_tel:c.telefono||p.cliente_tel}));setSucia&&setSucia(true);}}/>
              <Inp lbl="Dirección" val={o.cliente_dir} set={v=>upd("cliente_dir",v)} req ph="Calle, número, colonia"/>
              <Inp lbl="Ciudad" val={o.cliente_ciudad} set={v=>upd("cliente_ciudad",v)} req ph="Ciudad, estado"/>
              <Inp lbl="Teléfono" val={o.cliente_tel} set={v=>upd("cliente_tel",v)} req ph="10 dígitos" num/>
            </Card>
            <Card>
              <div style={{color:C.marino,fontWeight:800,fontSize:16,marginBottom:16}}>🔬 Datos del Equipo</div>
              <Sel lbl="Tipo de Equipo" val={o.equipo_tipo} set={v=>upd("equipo_tipo",v)} opts={Object.keys(EQUIPOS)} req/>
              <Inp lbl="Marca" val={o.equipo_marca} set={v=>upd("equipo_marca",v)} req ph="ej. Philips, Siemens, GE"/>
              <Inp lbl="Modelo" val={o.equipo_modelo} set={v=>upd("equipo_modelo",v)} req ph="Modelo del equipo"/>
              <Inp lbl="Número de Serie" val={o.equipo_serie} set={v=>upd("equipo_serie",v)} req ph="Serie del fabricante"/>
            </Card>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <Btn ch="💾 Borrador" onClick={()=>guardar("borrador")} color={C.cielo} out sm dis={saving}/>
              <Btn ch="Siguiente →" onClick={()=>setPaso(1)} color={C.marino}/>
            </div>
          </div>
        )}
        {paso===1&&(
          <div>
            <Card>
              <div style={{color:C.marino,fontWeight:800,fontSize:16,marginBottom:12}}>📋 Levantamiento de Equipo</div>
              <div style={{background:C.gris,borderRadius:8,padding:12,marginBottom:14,fontSize:13,color:C.texto}}>📅 {ahora()} | 👤 {usuario.nombre}</div>
              <TA lbl="Observaciones y fallas detectadas" val={o.lev_obs} set={v=>upd("lev_obs",v)} ph="Estado general del equipo, fallas visibles..."/>
              <div style={{fontSize:13,color:C.texto,marginBottom:4,fontWeight:600}}>📸 Fotos del equipo <span style={{color:C.error}}>* (mínimo 3)</span></div>
              <label style={{display:"inline-block",fontSize:13,cursor:"pointer",color:"#fff",background:C.cielo,borderRadius:8,padding:"8px 16px",fontWeight:700,marginBottom:10}}>
                📷 Tomar / subir foto
                <input type="file" accept="image/*" capture="environment" multiple onChange={manejarFotos} style={{display:"none"}}/>
              </label>
              {o.fotos?.length>0&&(
                <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:6}}>
                  {o.fotos.map((f,i)=>(
                    <div key={i} style={{position:"relative"}}>
                      <img src={f} style={{width:72,height:72,objectFit:"cover",borderRadius:8,border:`1px solid ${C.borde}`}}/>
                      <span onClick={()=>quitarFoto(i)} style={{position:"absolute",top:-6,right:-6,background:C.error,color:"#fff",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,cursor:"pointer",fontWeight:700}}>×</span>

            <div style={{display:"flex",justifyContent:"space-between"}}>

        {paso===2&&(

              <div style={{display:"flex",gap:10,marginBottom:20}}>

              <Btn ch="← Anterior" onClick={()=>setPaso(1)} color={C.texto} out sm/>
              <div>
                <Btn ch="💾" onClick={()=>guardar("borrador")} color={C.cielo} out sm dis={saving}/>

            <Card>
              <div style={{color:C.marino,fontWeight:800,fontSize:16,marginBottom:16}}>🛠️ Mantenimiento Correctivo</div>
              <div style={{display:"flex",gap:10,marginBottom:20}}>
                {[{v:true,lbl:"✓ Se realiza",col:C.exito},{v:false,lbl:"✗ No se realiza",col:C.error}].map(b=>(
                  <div key={String(b.v)} onClick={()=>upd("corr_realiza",b.v)} style={{flex:1,padding:14,borderRadius:10,textAlign:"center",cursor:"pointer",fontWeight:700,fontSize:14,background:o.corr_realiza===b.v?b.col:C.gris,color:o.corr_realiza===b.v?"#fff":C.texto,border:`2px solid ${o.corr_realiza===b.v?b.col:C.borde}`}}>{b.lbl}</div>
                ))}
              </div>
              {o.corr_realiza===true&&(
                <div>

              )}
            </Card>
            {o.corr_realiza!==null&&(
              <Card style={{background:C.amarillo,border:`1px solid #F0CA00`}}>
                <div style={{fontWeight:800,color:"#7D6608",marginBottom:12}}>✍️ Firma y Cierre</div>
                <Inp lbl="Nombre de quien firma" val={o.firma_nombre} set={v=>upd("firma_nombre",v)} ph="Nombre de quien recibe/firma el servicio"/>
                <div style={{marginBottom:16}}>

                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>

                  <Btn ch={saving?"Guardando...":"✅ Completar"} onClick={()=>{
                    if(!o.cliente_nombre||!o.equipo_tipo){setErrEnvio("Faltan datos del cliente o equipo. Regresa al paso 1.");return;}
                    if(o.prev_realiza===null){setErrEnvio("Define si se realizó mantenimiento preventivo.");return;}
                    if(o.corr_realiza===null){setErrEnvio("Define si se realizó mantenimiento correctivo.");return;}
                    if((o.fotos||[]).length<3){setErrEnvio("Agrega al menos 3 fotos del servicio (paso 2).");return;}
                    if(!o.envio_wa&&!o.envio_email){setErrEnvio("Ingresa WhatsApp o correo del cliente.");return;}
                    setErrEnvio("");guardar("completada");
                  }} color={C.exito} dis={saving}/>
                </div>
              </Card>
            )}
            <Btn ch="← Anterior" onClick={()=>setPaso(2)} color={C.texto} out sm/>
          </div>
        )}
      </div>
      {pendienteCliente&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>

            <div style={{fontSize:13,color:C.texto,marginBottom:18}}>Los datos de "{pendienteCliente.existente.nombre}" en esta orden son distintos a los del directorio. ¿Actualizar el directorio con los nuevos datos?</div>
            <Btn ch="Sí, actualizar" onClick={()=>resolverSyncCliente(true)} color={C.exito} full/>
            <Btn ch="No actualizar" onClick={()=>resolverSyncCliente(false)} color={C.texto} out full/>
          </div>
        </div>
      )}
    </div>
  );
}

function NuevaOrden({usuario,onDone,oe,setSucia,guardarBorradorRef,intentarSalir}){
  const esGen=oe?.equipo_tipo?.startsWith("GENERAL:");
  const [tipo,setTipo]=useState(oe?(esGen?"general":"mant"):null);
  if(!tipo){
    return (
      <div style={{padding:16,paddingBottom:80}}>
        <div style={{color:C.marino,fontWeight:800,fontSize:18,marginBottom:8}}>Nueva Orden</div>
        <div style={{color:C.texto,fontSize:14,marginBottom:24}}>¿Qué tipo de orden necesitas crear?</div>
        <div onClick={()=>setTipo("mant")} style={{background:C.blanco,borderRadius:12,padding:20,marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",cursor:"pointer",borderLeft:`4px solid ${C.marino}`}}>
          <div style={{fontWeight:800,color:C.marino,fontSize:16,marginBottom:4}}>🔬 Orden de Mantenimiento</div>
          <div style={{fontSize:13,color:C.texto}}>Para equipos de imagenología — incluye levantamiento, checklist preventivo y correctivo.</div>
        </div>
        <div onClick={()=>setTipo("general")} style={{background:C.blanco,borderRadius:12,padding:20,marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",cursor:"pointer",borderLeft:`4px solid ${C.cielo}`}}>
          <div style={{fontWeight:800,color:C.marino,fontSize:16,marginBottom:4}}>📋 Orden General</div>
          <div style={{fontSize:13,color:C.texto}}>Para instalaciones, entregas, recepciones, capacitaciones u otros servicios.</div>
        </div>
      </div>
    );
  }
  const volver=()=>intentarSalir?intentarSalir(()=>setTipo(null)):setTipo(null);
  if(tipo==="general") return <OrdenGeneral usuario={usuario} onDone={onDone} onVolver={volver} oe={oe} setSucia={setSucia} guardarBorradorRef={guardarBorradorRef}/>;
  return <OrdenMant usuario={usuario} onDone={onDone} onVolver={volver} oe={oe} setSucia={setSucia} guardarBorradorRef={guardarBorradorRef}/>;
}

        <button onClick={()=>setVistaClientes(true)} style={{flex:1,padding:"8px 4px",borderRadius:8,border:`2px solid ${C.marino}`,background:vistaClientes?C.marino:"transparent",color:vistaClientes?"#fff":C.marino,fontSize:12,fontWeight:700,cursor:"pointer"}}>Por cliente</button>

            {x==="todas"?"Todas":x==="borrador"?"Borradores":x==="en_proceso"?"En Proceso":"Completadas"}

            <div key={o.id} onClick={()=>onSel(o)} style={{background:C.blanco,borderRadius:12,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",cursor:"pointer",borderLeft:`4px solid ${o.estado==="completada"?C.exito:o.estado==="en_proceso"?C.cielo:"#F0CA00"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontWeight:800,color:C.marino,fontSize:16}}>Orden #{o.folio}</div>
                  <div style={{color:C.texto,fontSize:13,marginTop:2}}>{o.cliente_nombre||"Sin cliente"}</div>
                  <div style={{color:"#aaa",fontSize:12,marginTop:2}}>{o.equipo_tipo} {o.equipo_marca?`| ${o.equipo_marca}`:""}</div>
                  <div style={{color:"#ccc",fontSize:11,marginTop:2}}>{nombreU(o.creado_por)}</div>
                </div>
                <Badge tipo={o.estado}/>

            const ords=porCliente[nombre];
            return (
              <div key={nombre} style={{background:C.blanco,borderRadius:12,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",overflow:"hidden"}}>
                <div onClick={()=>setClienteAbierto(abierto?null:nombre)} style={{padding:14,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

                  <div style={{padding:"0 14px 14px"}}>
                    {ords.map(o=>(

function DetalleOrden({orden,usuario,onVolver,onRefrescar,onEditar}){
  const [confirmEliminar,setConfirmEliminar]=useState(false);
  const [eliminando,setEliminando]=useState(false);
  const [solicitado,setSolicitado]=useState(false);
  const [generandoPDF,setGenerandoPDF]=useState(false);
  const esAdmin=usuario.rol==="admin";
  const esBorrador=orden.estado==="borrador";
  const esEnProceso=orden.estado==="en_proceso";
  const esDueñoBorrador=esBorrador&&orden.creado_por===usuario.id;
  const esColaborador=comoArray(orden.colaboradores).includes(usuario.id);
  const esGen=orden.equipo_tipo?.startsWith("GENERAL:");
  async function descargarPDF(){
    setGenerandoPDF(true);
    try{await generarPDFOrden(orden);}
    catch(e){alert("Error al generar el PDF: "+e.message);}
    setGenerandoPDF(false);
  }
  async function eliminar(){
    setEliminando(true);
    await sb.from("citas").update({orden_id:null}).eq("orden_id",orden.id);
    const {error} = await sb.from("ordenes").delete().eq("id",orden.id);
    if(error){
      alert("Error al eliminar: " + error.message + " | Code: " + error.code);
      setEliminando(false);
      return;
    }
    await sb.from("notificaciones").insert({mensaje:`🗑️ Orden #${orden.folio} eliminada por ${usuario.nombre.split(" ")[0]}`});
    setEliminando(false);
    onRefrescar();
    onVolver();
  }
  async function solicitarPermiso(){
    await sb.from("solicitudes_edicion").insert({
      orden_id: orden.id,
      orden_folio: orden.folio,
      solicitado_por: usuario.id,
      estado: "pendiente"
    });
    const msg=`🔔 SOLICITUD|${orden.folio}|${usuario.id}|${orden.creado_por}|${usuario.nombre.split(" ")[0]} solicita permiso para editar Orden #${orden.folio} — ${orden.cliente_nombre}`;
    const notifs=[{mensaje:msg,para_rol:"admin"}];
    const creadorInfo=USUARIOS.find(u=>u.id===orden.creado_por);
    if(orden.creado_por&&orden.creado_por!==usuario.id&&creadorInfo?.rol!=="admin"){
      notifs.push({mensaje:msg,para_usuario_id:orden.creado_por});
    }
    await sb.from("notificaciones").insert(notifs);
    setSolicitado(true);
  }
  return (
    <div style={{padding:16,paddingBottom:80}}>
      <button onClick={onVolver} style={{background:"transparent",border:`1.5px solid ${C.borde}`,borderRadius:8,padding:"6px 14px",fontSize:13,cursor:"pointer",marginBottom:16}}>← Volver</button>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontWeight:800,color:C.marino,fontSize:18}}>Orden #{orden.folio}</div>
          <Badge tipo={orden.estado}/>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {(esAdmin||esDueñoBorrador||esColaborador)&&<Btn ch="✏️ Editar" onClick={()=>onEditar(orden)} color={C.cielo} sm/>}
          {(esAdmin||esDueñoBorrador)&&<Btn ch="🗑️ Eliminar" onClick={()=>setConfirmEliminar(true)} color={C.error} sm/>}
          {!esAdmin&&!esDueñoBorrador&&!esColaborador&&!esEnProceso&&!solicitado&&<Btn ch="✏️ Solicitar permiso" onClick={solicitarPermiso} color={C.cielo} sm/>}
          {!esAdmin&&solicitado&&<div style={{background:"#D5F5E3",color:"#1E8449",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700}}>✓ Solicitud enviada</div>}
        </div>
      </div>
      {esEnProceso&&(
        <div style={{background:"#D6EAF8",border:`1.5px solid ${C.cielo}`,borderRadius:10,padding:12,marginBottom:16,fontSize:13,color:"#1B4F72",fontWeight:600}}>
          🔒 Esta orden se está editando en este momento — modo solo lectura.
        </div>
      )}
      {confirmEliminar&&(
        <div style={{background:"#fdecea",border:`1.5px solid ${C.error}`,borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{fontWeight:700,color:C.error,marginBottom:8}}>⚠️ ¿Eliminar esta orden permanentemente?</div>
          <div style={{fontSize:13,color:C.texto,marginBottom:12}}>Esta acción no se puede deshacer.</div>
          <div style={{display:"flex",gap:8}}>
            <Btn ch={eliminando?"Eliminando...":"Sí, eliminar"} onClick={eliminar} color={C.error} sm dis={eliminando}/>
            <Btn ch="Cancelar" onClick={()=>setConfirmEliminar(false)} color={C.texto} out sm/>
          </div>
        </div>
      )}
      <Card>
        <div style={{fontWeight:700,color:C.marino,marginBottom:10}}>👤 Cliente</div>
        <div style={{fontSize:14}}><strong>{orden.cliente_nombre}</strong></div>
        <div style={{fontSize:13,color:C.texto}}>{orden.cliente_dir} | {orden.cliente_ciudad}</div>
        <div style={{fontSize:13,color:C.texto}}>Tel: {orden.cliente_tel}</div>
        {orden.ubicacion&&<div style={{marginTop:8}}><a href={`https://maps.google.com/?q=${orden.ubicacion}`} target="_blank" rel="noopener noreferrer" style={{fontSize:13,color:C.cielo,fontWeight:700,textDecoration:"none"}}>📍 Ver ubicación en el mapa</a></div>}
        <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.borde}`,fontSize:12,color:"#aaa"}}>
          Realizado por: <strong style={{color:C.marino}}>{nombreU(orden.creado_por)}</strong>
          {comoArray(orden.colaboradores).length>0&&<> + <strong style={{color:C.marino}}>{comoArray(orden.colaboradores).map(id=>nombreU(id)).join(", ")}</strong></>}
        </div>
      </Card>
      <Card>
        <div style={{fontWeight:700,color:C.marino,marginBottom:10}}>🔬 Equipo</div>
        <div style={{fontSize:14}}><strong>{orden.equipo_tipo}</strong></div>
        <div style={{fontSize:13,color:C.texto}}>{orden.equipo_marca} {orden.equipo_modelo} | Serie: {orden.equipo_serie}</div>
        {orden.equipo&&<div style={{marginTop:6,fontSize:13,color:C.texto}}><strong>Equipo relacionado:</strong> {orden.equipo}</div>}
      </Card>
      <Card>
        <div style={{fontWeight:700,color:C.marino,marginBottom:8}}>📋 Levantamiento</div>
        <div style={{fontSize:14}}>{orden.lev_obs||"Sin observaciones"}</div>
        {comoArray(orden.fotos).length>0&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:12}}>
            {comoArray(orden.fotos).map((f,i)=><img key={i} src={f} style={{width:80,height:80,objectFit:"cover",borderRadius:8,border:`1px solid ${C.borde}`}}/>)}
          </div>
        )}
      </Card>
      {!esGen&&(
      <Card>
        <div style={{fontWeight:700,color:C.marino,marginBottom:8}}>🔧 Preventivo</div>
        {orden.prev_realiza===false&&<div style={{color:C.error,fontWeight:700}}>✗ No se realizó</div>}
        {orden.prev_realiza===true&&(
          <div>
            <div style={{color:C.exito,fontWeight:700,marginBottom:8}}>✓ Realizado</div>
            {Object.entries(orden.prev_checklist||{}).map(([sec,d])=>(
              <div key={sec} style={{marginBottom:8}}>
                <div style={{fontWeight:700,fontSize:13}}>{sec}</div>
                {d.realiza===false?<div style={{color:C.error,fontSize:12}}>No se realizó</div>
                :Object.entries(d.items||{}).map(([it,v])=>(
                  <div key={it} style={{fontSize:12,color:v?C.exito:C.texto,paddingLeft:12}}>{v?"✓":"○"} {it}</div>
                ))}
              </div>
            ))}
            {orden.prev_comentarios&&<div style={{marginTop:8,fontSize:13}}><strong>Comentarios:</strong> {orden.prev_comentarios}</div>}
            {orden.prev_proximo&&<div style={{marginTop:8,background:C.amarillo,borderRadius:8,padding:8,fontSize:13,color:"#7D6608"}}>📅 Próximo: <strong>{orden.prev_proximo}</strong></div>}
          </div>
        )}
        {orden.prev_realiza===null&&<div style={{color:"#aaa"}}>Pendiente</div>}
      </Card>
      )}
      {!esGen&&(
      <Card>
        <div style={{fontWeight:700,color:C.marino,marginBottom:8}}>🛠️ Correctivo</div>
        {orden.corr_realiza===false&&<div style={{color:C.error,fontWeight:700}}>✗ No se realizó</div>}
        {orden.corr_realiza===true&&(
          <div>
            <div style={{color:C.exito,fontWeight:700,marginBottom:8}}>✓ Realizado</div>
            <div style={{fontSize:14,marginBottom:8}}>{orden.corr_descripcion}</div>
            {orden.corr_refacciones&&<div style={{fontSize:13}}><strong>Refacciones:</strong> {orden.corr_refacciones}</div>}
          </div>
        )}
        {orden.corr_realiza===null&&<div style={{color:"#aaa"}}>Pendiente</div>}
      </Card>
      )}
      {(orden.firma_imagen||orden.firma_nombre)&&(
        <Card>
          <div style={{fontWeight:700,color:C.marino,marginBottom:8}}>✍️ Firma</div>
          {orden.firma_nombre&&<div style={{fontSize:13,color:C.texto,marginBottom:8}}>{orden.firma_nombre}</div>}
          {orden.firma_imagen&&<img src={orden.firma_imagen} style={{maxWidth:200,background:"#fff",border:`1px solid ${C.borde}`,borderRadius:8}}/>}
        </Card>
      )}
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Btn ch={generandoPDF?"Generando...":"📄 PDF"} onClick={descargarPDF} color={C.cielo} sm dis={generandoPDF}/>
        <Btn ch="📱 WhatsApp" onClick={()=>{
          const tel=orden.envio_wa||orden.cliente_tel;
          if(!tel){alert("Esta orden no tiene un WhatsApp registrado.");return;}
          const msg=`Hola ${orden.cliente_nombre}, le compartimos el resumen de la Orden #${orden.folio} (${orden.equipo_tipo}) realizada por Electromédica del Bajío. Estado: ${orden.estado==="completada"?"Completada":orden.estado}.`;
          window.open(linkWhatsApp(tel,msg),"_blank");
        }} color={C.exito} sm/>
        <Btn ch="✉️ Correo" onClick={()=>{
          const email=orden.envio_email;
          if(!email){alert("Esta orden no tiene un correo registrado.");return;}
          const msg=`Hola ${orden.cliente_nombre},\n\nLe compartimos el resumen de la Orden #${orden.folio} (${orden.equipo_tipo}) realizada por Electromédica del Bajío.\nEstado: ${orden.estado==="completada"?"Completada":orden.estado}.\n\nSaludos.`;
          window.open(linkCorreo(email,`Orden #${orden.folio} — Electromédica del Bajío`,msg),"_blank");
        }} color={C.marino} sm/>
      </div>
    </div>
  );
}

function FormularioCita({usuario,citas,onCancelar,onGuardado,prefill,citaExistente}){
  const esAdmin=usuario.rol==="admin"||usuario.rol==="supervisor";
  const [usuariosApp,setUsuariosApp]=useState([]);
  const [clienteHistorial,setClienteHistorial]=useState([]);
  const [c,setC]=useState({
    cliente_nombre:citaExistente?.cliente_nombre||prefill?.cliente_nombre||"",
    cliente_direccion:citaExistente?.cliente_direccion||prefill?.cliente_direccion||"",
    cliente_telefono:citaExistente?.cliente_telefono||prefill?.cliente_telefono||"",
    descripcion:citaExistente?.descripcion||prefill?.descripcion||"",
    fecha:citaExistente?.fecha||prefill?.fecha||"",
    hora:citaExistente?.hora?.slice(0,5)||"",
    duracion_horas:citaExistente?.duracion_horas||1,
    traslado_minutos:citaExistente?.traslado_minutos??40,
    ingeniero_id:citaExistente?citaExistente.ingeniero_id:(esAdmin?"":usuario.id),
    colaborador_id:citaExistente?.colaborador_id||""
  });
  const [error,setError]=useState("");
  const [confirmando,setConfirmando]=useState(false);
  const [guardando,setGuardando]=useState(false);
  useEffect(()=>{(async()=>{const {data}=await sb.from("usuarios").select("id,nombre,rol").order("id");if(data)setUsuariosApp(data);})();},[]);
  useEffect(()=>{
    if(!esAdmin||!c.cliente_nombre||c.cliente_nombre.trim().length<2){setClienteHistorial([]);return;}
    let activo=true;
    (async()=>{
      const {data}=await sb.from("ordenes").select("creado_por").ilike("cliente_nombre",`%${c.cliente_nombre.trim()}%`);
      if(activo)setClienteHistorial([...new Set((data||[]).map(o=>o.creado_por))]);
    })();
    return ()=>{activo=false;};
  },[c.cliente_nombre]);
  function upd(k,v){setC(p=>({...p,[k]:v}));}
  const ingenierosOrdenados=[...usuariosApp].sort((a,b)=>{
    const ha=clienteHistorial.includes(a.id)?0:1,hb=clienteHistorial.includes(b.id)?0:1;
    return ha-hb;
  });
  const ingIdActual=esAdmin?(c.ingeniero_id?parseInt(c.ingeniero_id):null):usuario.id;
  const colabIdActual=c.colaborador_id?parseInt(c.colaborador_id):null;
  const citasDelDia=(c.fecha&&ingIdActual)?citas.filter(x=>x.fecha===c.fecha&&x.estado!=="cancelada"&&x.id!==citaExistente?.id&&(x.ingeniero_id===ingIdActual||x.colaborador_id===ingIdActual||(colabIdActual&&(x.ingeniero_id===colabIdActual||x.colaborador_id===colabIdActual)))).sort((a,b)=>a.hora.localeCompare(b.hora)):[];
  const horariosLibres=(c.fecha&&ingIdActual)?HORAS_DIA.filter(h=>{
    const candidato={fecha:c.fecha,hora:h,duracion_horas:parseFloat(c.duracion_horas)||1,traslado_minutos:parseInt(c.traslado_minutos)||0};
    return !citasDelDia.some(x=>citasSeTraslapan(candidato,x));
  }):[];
  function validar(){
    if(!c.cliente_nombre||!c.cliente_direccion||!c.descripcion||!c.fecha||!c.hora||!c.duracion_horas){setError("Completa todos los campos obligatorios.");return false;}
    if(esAdmin&&!c.ingeniero_id){setError("Selecciona un ingeniero.");return false;}
    setError("");return true;
  }
  function buscarConflicto(){
    const ingId=esAdmin?parseInt(c.ingeniero_id):usuario.id;
    const nueva={fecha:c.fecha,hora:c.hora,duracion_horas:parseFloat(c.duracion_horas),traslado_minutos:parseInt(c.traslado_minutos)};
    const involucrados=[ingId];
    if(c.colaborador_id)involucrados.push(parseInt(c.colaborador_id));
    return citas.filter(x=>x.estado!=="cancelada"&&x.id!==citaExistente?.id&&(involucrados.includes(x.ingeniero_id)||involucrados.includes(x.colaborador_id))).find(x=>citasSeTraslapan(nueva,x))||null;
  }
  function intentarGuardar(){
    if(!validar())return;
    const choque=buscarConflicto();
    if(choque){setError(`⚠️ Ese horario ya no está disponible: se empalma con ${choque.cliente_nombre} el ${choque.fecha} a las ${choque.hora.slice(0,5)}. Elige otro horario.`);return;}
    setError("");setConfirmando(true);
  }
  async function guardar(){
    setGuardando(true);
    const ingId=esAdmin?parseInt(c.ingeniero_id):usuario.id;
    const datos={
      cliente_nombre:c.cliente_nombre,cliente_direccion:c.cliente_direccion,cliente_telefono:c.cliente_telefono,
      ingeniero_id:ingId,colaborador_id:c.colaborador_id?parseInt(c.colaborador_id):null,
      descripcion:c.descripcion,fecha:c.fecha,hora:c.hora,
      duracion_horas:parseFloat(c.duracion_horas),traslado_minutos:parseInt(c.traslado_minutos)
    };
    let citaId=citaExistente?.id;
    if(citaExistente){
      await sb.from("citas").update(datos).eq("id",citaExistente.id);
    }else{
      datos.estado="agendada";datos.orden_id=prefill?.orden_id||null;datos.creado_por=usuario.id;
      const {data:citaCreada}=await sb.from("citas").insert(datos).select().single();
      citaId=citaCreada?.id;
      if(prefill?.orden_id&&citaId){
        const {data:ordenActualizada}=await sb.from("ordenes").update({mant_cita_id:citaId,mant_estado:"agendado"}).eq("id",prefill.orden_id).select("cliente_nombre,equipo_tipo").single();
        if(ordenActualizada)await limpiarNotifsMantenimiento(ordenActualizada.cliente_nombre,ordenActualizada.equipo_tipo);
      }
    }
    const msg=`📅 Cita ${citaExistente?"reagendada":"agendada"}: ${c.cliente_nombre} — ${c.fecha} ${c.hora} — ${nombreU(ingId)}`;
    await sb.from("notificaciones").insert([{mensaje:msg,para_rol:"admin"},{mensaje:msg,para_usuario_id:ingId}]);
    if(c.cliente_telefono||prefill){
      const msgCliente=`Su cita de servicio con Electromédica del Bajío quedó ${citaExistente?"reagendada":"agendada"} para el ${c.fecha} a las ${c.hora} con Ing. ${nombreU(ingId)}. Motivo: ${c.descripcion}`;
      notificarCliente({telefono:c.cliente_telefono,mensaje:msgCliente,asunto:"Cita de servicio"});
    }
    setGuardando(false);setConfirmando(false);
    onGuardado();
  }
  return (
    <Card>
      <div style={{fontWeight:800,color:C.marino,marginBottom:12}}>📅 {citaExistente?"Reagendar Cita":"Nueva Cita"}</div>
      <BuscadorCliente val={c.cliente_nombre} set={v=>upd("cliente_nombre",v)} onSeleccionar={cl=>setC(p=>({...p,cliente_nombre:cl.nombre,cliente_direccion:cl.direccion||p.cliente_direccion,cliente_telefono:cl.telefono||p.cliente_telefono}))}/>
      <Inp lbl="Ubicación" val={c.cliente_direccion} set={v=>upd("cliente_direccion",v)} req ph="Dirección del servicio"/>
      <Inp lbl="Teléfono del cliente" val={c.cliente_telefono} set={v=>upd("cliente_telefono",v)} ph="10 dígitos" num/>
      <TA lbl="Servicio a realizar" val={c.descripcion} set={v=>upd("descripcion",v)} req ph="Descripción abierta del servicio..."/>
      <Inp lbl="Fecha" val={c.fecha} set={v=>{upd("fecha",v);upd("hora","");}} req type="date"/>
      <Inp lbl="Duración (horas)" val={c.duracion_horas} set={v=>{upd("duracion_horas",v);upd("hora","");}} req type="number"/>
      <Inp lbl="Tiempo de traslado (min)" val={c.traslado_minutos} set={v=>{upd("traslado_minutos",v);upd("hora","");}} req type="number"/>
      {esAdmin&&(
        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,color:C.texto,marginBottom:4,fontWeight:600}}>Ingeniero<span style={{color:C.error}}> *</span></div>
          <select value={c.ingeniero_id} onChange={e=>{upd("ingeniero_id",e.target.value);upd("hora","");}} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1.5px solid ${C.borde}`,fontSize:15,background:"#fff"}}>
            <option value="">-- Seleccionar --</option>
            {ingenierosOrdenados.map(u=><option key={u.id} value={u.id}>{u.nombre}{clienteHistorial.includes(u.id)?" ⭐ (ya atendió a este cliente)":""}</option>)}
          </select>
        </div>
      )}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:13,color:C.texto,marginBottom:4,fontWeight:600}}>Compañero (opcional)</div>
        <select value={c.colaborador_id} onChange={e=>{upd("colaborador_id",e.target.value);upd("hora","");}} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1.5px solid ${C.borde}`,fontSize:15,background:"#fff"}}>
          <option value="">-- Ninguno --</option>
          {usuariosApp.filter(u=>u.id!==(esAdmin?parseInt(c.ingeniero_id||0):usuario.id)).map(u=><option key={u.id} value={u.id}>{u.nombre}</option>)}
        </select>
      </div>
      {c.fecha&&!ingIdActual&&<div style={{fontSize:13,color:C.texto,marginBottom:14}}>Selecciona un ingeniero para ver los horarios disponibles.</div>}
      {c.fecha&&ingIdActual&&citasDelDia.length>0&&(
        <div style={{background:C.gris,borderRadius:8,padding:12,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,color:C.marino,marginBottom:8}}>🗓️ Otras citas ese día (para calcular traslado)</div>
          {citasDelDia.map(x=>(
            <div key={x.id} style={{fontSize:12,color:C.texto,marginBottom:6}}>
              <strong>{x.hora.slice(0,5)}</strong> — {x.cliente_nombre} ({x.duracion_horas}h) — {x.descripcion}<br/>
              <span style={{color:"#aaa"}}>📍 {x.cliente_direccion}</span>
            </div>
          ))}
        </div>
      )}
      {c.fecha&&ingIdActual&&(
        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,color:C.texto,marginBottom:4,fontWeight:600}}>Hora<span style={{color:C.error}}> *</span></div>
          {horariosLibres.length===0&&<div style={{fontSize:13,color:C.error}}>Sin horarios disponibles ese día para el/los involucrados.</div>}
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {horariosLibres.map(h=>(
              <span key={h} onClick={()=>upd("hora",h)} style={{padding:"6px 12px",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",background:c.hora===h?C.marino:"#eee",color:c.hora===h?"#fff":C.texto}}>{h}</span>
            ))}
          </div>
        </div>
      )}
      {error&&<div style={{color:C.error,fontSize:13,marginBottom:10}}>{error}</div>}
      <div style={{display:"flex",gap:8}}>
        <Btn ch="Agendar" onClick={intentarGuardar} color={C.exito} sm/>
        <Btn ch="Cancelar" onClick={onCancelar} color={C.texto} out sm/>
      </div>
      {confirmando&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:14,padding:22,maxWidth:340,width:"100%"}}>
            <div style={{fontWeight:800,color:C.marino,fontSize:16,marginBottom:8}}>¿Confirmar esta cita?</div>
            <div style={{fontSize:13,color:C.texto,marginBottom:18}}>
              {c.cliente_nombre}<br/>{c.fecha} a las {c.hora} ({c.duracion_horas}h + {c.traslado_minutos}min traslado)<br/>
              {esAdmin?nombreU(parseInt(c.ingeniero_id)):usuario.nombre}{c.colaborador_id?` + ${nombreU(parseInt(c.colaborador_id))}`:""}
            </div>
            <Btn ch={guardando?"Guardando...":"Sí, agendar"} onClick={guardar} color={C.exito} full dis={guardando}/>
            <Btn ch="Cancelar" onClick={()=>setConfirmando(false)} color={C.texto} out full dis={guardando}/>
          </div>
        </div>
      )}
    </Card>
  );
}

function Agenda({ordenes,usuario,citas,recargarCitas,recargarOrdenes,recargarNotifs,prefill,limpiarPrefill}){
  const hoy=new Date();
  const [mes,setMes]=useState(hoy.getMonth());
  const [anio,setAnio]=useState(hoy.getFullYear());
  const [dia,setDia]=useState(null);
  const [mostrarForm,setMostrarForm]=useState(false);
  const [citaSel,setCitaSel]=useState(null);
  const [reagendando,setReagendando]=useState(false);
  const [confirmCancelar,setConfirmCancelar]=useState(false);
  const [confirmNoRealiza,setConfirmNoRealiza]=useState(null);
  const [prefillLocal,setPrefillLocal]=useState(null);
  const meses=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  useEffect(()=>{if(prefill)setMostrarForm(true);},[prefill]);
  async function confirmarNoRealiza(){
    await marcarMantNoRealiza(confirmNoRealiza);
    setConfirmNoRealiza(null);
    recargarOrdenes&&recargarOrdenes();
    recargarNotifs&&recargarNotifs();
  }
  function agendarDesdeOrden(o){
    setPrefillLocal({cliente_nombre:o.cliente_nombre,cliente_direccion:o.cliente_dir,cliente_telefono:o.cliente_tel,descripcion:`Mantenimiento preventivo — ${o.equipo_tipo}`,fecha:o.prev_proximo,orden_id:o.id});
    setDia(null);setMostrarForm(true);
  }
  const eventosMant={};
  ordenes.forEach(o=>{
    if(o.prev_proximo&&!o.mant_cita_id){
      const d=new Date(o.prev_proximo+"T00:00:00");
      if(!isNaN(d)){
        const k=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        if(!eventosMant[k])eventosMant[k]=[];
        eventosMant[k].push(o);
      }
    }
  });
  const citasActivas=citas.filter(c=>c.estado!=="cancelada");
  const citasPorDia={};
  citasActivas.forEach(c=>{
    const d=new Date(c.fecha+"T00:00:00");
    if(isNaN(d))return;
    const k=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    (citasPorDia[k]=citasPorDia[k]||[]).push(c);
  });
  const primerDia=new Date(anio,mes,1).getDay();
  const diasMes=new Date(anio,mes+1,0).getDate();
  const celdas=[];
  for(let i=0;i<primerDia;i++)celdas.push(null);
  for(let d=1;d<=diasMes;d++)celdas.push(d);
  while(celdas.length%7!==0)celdas.push(null);
  const esHoy=d=>d===hoy.getDate()&&mes===hoy.getMonth()&&anio===hoy.getFullYear();
  const claveDia=d=>`${anio}-${mes}-${d}`;
  const citasDelDia=dia?citasPorDia[claveDia(dia)]||[]:[];
  const mantDelDia=dia?eventosMant[claveDia(dia)]||[]:[];
  function prevMes(){if(mes===0){setMes(11);setAnio(a=>a-1);}else setMes(m=>m-1);setDia(null);}
  function nextMes(){if(mes===11){setMes(0);setAnio(a=>a+1);}else setMes(m=>m+1);setDia(null);}
  function cerrarForm(){setMostrarForm(false);setPrefillLocal(null);limpiarPrefill&&limpiarPrefill();}
  function alGuardar(){cerrarForm();recargarCitas();recargarOrdenes&&recargarOrdenes();recargarNotifs&&recargarNotifs();}
  async function cancelarCita(){
    await sb.from("citas").update({estado:"cancelada"}).eq("id",citaSel.id);
    const msg=`❌ Cita cancelada: ${citaSel.cliente_nombre} — ${citaSel.fecha} ${citaSel.hora.slice(0,5)}`;
    await sb.from("notificaciones").insert([{mensaje:msg,para_rol:"admin"},{mensaje:msg,para_usuario_id:citaSel.ingeniero_id}]);
    if(citaSel.cliente_telefono){
      notificarCliente({telefono:citaSel.cliente_telefono,mensaje:`Su cita programada para el ${citaSel.fecha} a las ${citaSel.hora.slice(0,5)} ha sido cancelada. Contáctenos para reprogramar.`,asunto:"Cita cancelada"});
    }
    setConfirmCancelar(false);setCitaSel(null);recargarCitas();
  }
  const pendientesAgendar=ordenes.filter(o=>o.prev_realiza&&o.prev_proximo&&!o.mant_cita_id&&o.mant_estado!=="no_realiza");
  return (
    <div style={{padding:16,paddingBottom:80}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{color:C.marino,fontWeight:800,fontSize:18}}>📅 Agenda</div>
        {!mostrarForm&&<button onClick={()=>setMostrarForm(true)} style={{width:36,height:36,borderRadius:"50%",background:C.marino,color:"#fff",border:"none",fontSize:20,fontWeight:700,cursor:"pointer",lineHeight:1}}>+</button>}
      </div>
      {mostrarForm&&<FormularioCita usuario={usuario} citas={citas} onCancelar={cerrarForm} onGuardado={alGuardar} prefill={prefill||prefillLocal}/>}
      {!mostrarForm&&(
        <>
          <div style={{background:C.blanco,borderRadius:12,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",overflow:"hidden",marginBottom:16}}>
            <div style={{background:C.marino,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span onClick={prevMes} style={{color:"#fff",cursor:"pointer",fontSize:22,padding:"0 8px"}}>‹</span>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <select value={mes} onChange={e=>{setMes(parseInt(e.target.value));setDia(null);}} style={{background:"rgba(255,255,255,0.15)",color:"#fff",border:"none",borderRadius:6,padding:"4px 6px",fontSize:14,fontWeight:700}}>
                  {meses.map((m,i)=><option key={m} value={i} style={{color:"#000"}}>{m}</option>)}
                </select>
                <select value={anio} onChange={e=>{setAnio(parseInt(e.target.value));setDia(null);}} style={{background:"rgba(255,255,255,0.15)",color:"#fff",border:"none",borderRadius:6,padding:"4px 6px",fontSize:14,fontWeight:700}}>
                  {Array.from({length:5},(_,i)=>hoy.getFullYear()-1+i).map(a=><option key={a} value={a} style={{color:"#000"}}>{a}</option>)}
                </select>
              </div>
              <span onClick={nextMes} style={{color:"#fff",cursor:"pointer",fontSize:22,padding:"0 8px"}}>›</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:C.gris}}>
              {["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"].map(d=><div key={d} style={{textAlign:"center",padding:"8px 0",fontSize:11,fontWeight:700,color:C.texto}}>{d}</div>)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
              {celdas.map((d,i)=>{
                const sel=d===dia;const hoyF=d&&esHoy(d);
                const citasD=d?citasPorDia[claveDia(d)]:null;
                const mantD=d?eventosMant[claveDia(d)]:null;
                return (
                  <div key={i} onClick={()=>d&&setDia(d)} style={{minHeight:44,padding:"6px 4px",textAlign:"center",cursor:d?"pointer":"default",borderBottom:`1px solid ${C.borde}`,borderRight:i%7!==6?`1px solid ${C.borde}`:"none",background:sel?C.marino:"#fff"}}>
                    {d&&(
                      <div>
                        <div style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",background:hoyF?C.cielo:"transparent",color:sel?"#fff":hoyF?"#fff":C.texto,fontWeight:hoyF||sel?800:400,fontSize:14}}>{d}</div>
                        <div style={{display:"flex",justifyContent:"center",gap:2,marginTop:2}}>
                          {citasD&&<div style={{width:6,height:6,borderRadius:"50%",background:sel?"#FFF3B0":colorU(citasD[0].ingeniero_id)}}/>}
                          {mantD&&<div style={{width:6,height:6,borderRadius:"50%",background:sel?"#FFF3B0":C.amarillo,border:`1px solid ${C.texto}`}}/>}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
          {dia&&(
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{color:C.marino,fontWeight:800,fontSize:16}}>{dia} de {meses[mes]} de {anio}</div>
                <Btn ch="📅 Agendar cita" onClick={()=>{setPrefillLocal({fecha:`${anio}-${String(mes+1).padStart(2,"0")}-${String(dia).padStart(2,"0")}`});setMostrarForm(true);}} color={C.marino} sm/>
              </div>
              {citasDelDia.length===0&&mantDelDia.length===0&&<div style={{background:C.blanco,borderRadius:12,padding:20,textAlign:"center",color:C.texto,marginBottom:12}}>Sin citas para este día.</div>}
              {citasDelDia.map(cit=>(
                <div key={cit.id} onClick={()=>setCitaSel(cit)} style={{background:C.blanco,borderRadius:12,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",borderLeft:`4px solid ${colorU(cit.ingeniero_id)}`,cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontWeight:800,color:C.marino}}>{cit.hora.slice(0,5)} — {cit.cliente_nombre}</div>
                    <div style={{fontSize:11,color:"#fff",background:colorU(cit.ingeniero_id),borderRadius:14,padding:"3px 10px",fontWeight:700}}>{nombreU(cit.ingeniero_id).split(" ")[0]}{cit.colaborador_id?` + ${nombreU(cit.colaborador_id).split(" ")[0]}`:""}</div>
                  </div>
                  <div style={{fontSize:13,color:C.texto,marginTop:4}}>{cit.descripcion}</div>
                  <div style={{fontSize:12,color:"#aaa"}}>{cit.cliente_direccion} | {cit.duracion_horas}h + {cit.traslado_minutos}min traslado</div>
                </div>
              ))}
              {mantDelDia.map(o=>(
                <div key={o.id} style={{background:C.amarillo,borderRadius:12,padding:16,marginBottom:12,border:"1px solid #F0CA00"}}>
                  <div style={{fontWeight:800,color:"#7D6608"}}>🔧 Mantenimiento programado — Orden #{o.folio}</div>
                  <div style={{fontSize:13,color:"#7D6608",marginTop:4}}>{o.cliente_nombre} — {o.equipo_tipo}</div>
                  <div style={{marginTop:8}}>
                    <Btn ch="📅 Agendar" onClick={()=>agendarDesdeOrden(o)} color={C.marino} sm/>
                    <Btn ch="🚫 No se realiza" onClick={()=>setConfirmNoRealiza(o)} color={C.error} out sm/>
                  </div>
                </div>
              ))}
            </div>
          )}
          {!dia&&<div style={{background:C.blanco,borderRadius:12,padding:16,fontSize:13,color:C.texto,textAlign:"center",marginBottom:16}}>Toca un día para ver citas y mantenimientos.<br/><span style={{fontSize:12,color:"#aaa"}}>Puntos de color = citas agendadas. Puntos amarillos = mantenimiento pendiente de agendar.</span></div>}
          {pendientesAgendar.length>0&&(
            <div style={{marginTop:8}}>
              <div style={{color:C.marino,fontWeight:800,fontSize:16,marginBottom:10}}>⏳ Pendientes de agendar</div>
              {pendientesAgendar.map(o=>(
                <div key={o.id} style={{background:C.blanco,borderRadius:12,padding:14,marginBottom:10,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:700,color:C.marino,fontSize:14}}>{o.cliente_nombre}</div>
                    <div style={{fontSize:12,color:"#aaa"}}>{o.equipo_tipo} — próximo: {o.prev_proximo}</div>
                  </div>
                  <div>
                    <Btn ch="📅 Agendar" onClick={()=>agendarDesdeOrden(o)} color={C.marino} sm/>
                    <Btn ch="🚫 No se realiza" onClick={()=>setConfirmNoRealiza(o)} color={C.error} out sm/>
                  </div>
                </div>
              ))}
            </div>
          )}
        </>
      )}
      {citaSel&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:14,padding:22,maxWidth:360,width:"100%"}}>
            {!reagendando&&!confirmCancelar&&(
              <>
                <div style={{fontWeight:800,color:C.marino,fontSize:16,marginBottom:8}}>{citaSel.cliente_nombre}</div>
                <div style={{fontSize:13,color:C.texto,marginBottom:4}}>{citaSel.fecha} a las {citaSel.hora.slice(0,5)} ({citaSel.duracion_horas}h)</div>
                <div style={{fontSize:13,color:C.texto,marginBottom:4}}>{citaSel.cliente_direccion}</div>
                <div style={{fontSize:13,color:C.texto,marginBottom:16}}>{citaSel.descripcion}</div>
                <Btn ch="🔁 Reagendar" onClick={()=>setReagendando(true)} color={C.cielo} full/>
                <Btn ch="❌ Cancelar cita" onClick={()=>setConfirmCancelar(true)} color={C.error} full/>
                <Btn ch="Cerrar" onClick={()=>setCitaSel(null)} color={C.texto} out full/>
              </>
            )}
            {confirmCancelar&&(
              <>
                <div style={{fontWeight:800,color:C.error,fontSize:16,marginBottom:8}}>⚠️ ¿Cancelar esta cita?</div>
                <div style={{fontSize:13,color:C.texto,marginBottom:18}}>Se notificará al ingeniero, admin y cliente.</div>
                <Btn ch="Sí, cancelar" onClick={cancelarCita} color={C.error} full/>
                <Btn ch="Volver" onClick={()=>setConfirmCancelar(false)} color={C.texto} out full/>
              </>
            )}
          </div>
        </div>
      )}
      {citaSel&&reagendando&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20,overflowY:"auto"}}>
          <div style={{width:"100%",maxWidth:400}}>
            <FormularioCita usuario={usuario} citas={citas} citaExistente={citaSel} onCancelar={()=>{setReagendando(false);setCitaSel(null);}} onGuardado={()=>{setReagendando(false);setCitaSel(null);recargarCitas();}}/>
          </div>
        </div>
      )}
      {confirmNoRealiza&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:14,padding:22,maxWidth:340,width:"100%"}}>
            <div style={{fontWeight:800,color:C.error,fontSize:16,marginBottom:8}}>⚠️ ¿Confirmar que no se realizará?</div>
            <div style={{fontSize:13,color:C.texto,marginBottom:18}}>Se le avisará a {confirmNoRealiza.cliente_nombre} que el mantenimiento no se realizará.</div>
            <Btn ch="Sí, confirmar" onClick={confirmarNoRealiza} color={C.error} full/>
            <Btn ch="Volver" onClick={()=>setConfirmNoRealiza(null)} color={C.texto} out full/>
          </div>
        </div>
      )}
    </div>
  );
}

function RespaldoDrive(){
  const hoy=new Date();
  const mesAnteriorIdx=hoy.getMonth()===0?11:hoy.getMonth()-1;
  const anioMesAnterior=hoy.getMonth()===0?hoy.getFullYear()-1:hoy.getFullYear();
  const [mesSel,setMesSel]=useState(mesAnteriorIdx);
  const [anioSel,setAnioSel]=useState(anioMesAnterior);
  const [estado,setEstado]=useState(""); // "", "subiendo", "listo", "error"
  const [error,setError]=useState("");
  const [confirmar,setConfirmar]=useState(false);
  const [resultado,setResultado]=useState(null);
  async function exportarYBorrar(){
    setConfirmar(false);setEstado("subiendo");setError("");
    try{
      const {desde,hasta}=rangoMes(anioSel,mesSel);
      const {data,error:errSel}=await sb.from("notificaciones").select("*").gte("fecha",desde).lt("fecha",hasta).order("fecha");
      if(errSel)throw errSel;
      if(!data||data.length===0){setEstado("");setError(`No hay notificaciones de ${NOMBRES_MES[mesSel]} ${anioSel} para exportar.`);return;}
      const csv=generarCSVNotificaciones(data);
      const token=await obtenerTokenGoogle();
      const nombreArchivo=`notificaciones_${NOMBRES_MES[mesSel]}_${anioSel}.csv`;
      await subirCSVaDrive(token,nombreArchivo,csv);
      const ids=data.map(n=>n.id);
      await sb.from("notificaciones").delete().in("id",ids);
      setResultado({archivo:nombreArchivo,cantidad:data.length});
      setEstado("listo");
    }catch(e){
      setEstado("error");setError(e.message||"No se pudo completar el respaldo.");
    }
  }
  return (
    <Card>
      <div style={{fontWeight:700,color:C.marino,marginBottom:8}}>📦 Respaldo de notificaciones a Google Drive</div>
      <div style={{fontSize:12,color:"#aaa",marginBottom:12}}>Exporta las notificaciones del mes elegido a un CSV en tu Google Drive, y las elimina de la base de datos para no retener info en la nube. Te pedirá iniciar sesión con Google la primera vez de cada sesión de navegador.</div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <select value={mesSel} onChange={e=>setMesSel(parseInt(e.target.value))} style={{flex:1,padding:"8px 10px",borderRadius:8,border:`1.5px solid ${C.borde}`,fontSize:14,background:"#fff"}}>
          {NOMBRES_MES.map((m,i)=><option key={m} value={i} style={{textTransform:"capitalize"}}>{m}</option>)}
        </select>
        <select value={anioSel} onChange={e=>setAnioSel(parseInt(e.target.value))} style={{width:100,padding:"8px 10px",borderRadius:8,border:`1.5px solid ${C.borde}`,fontSize:14,background:"#fff"}}>
          {[hoy.getFullYear()-1,hoy.getFullYear()].map(a=><option key={a} value={a}>{a}</option>)}
        </select>
      </div>
      {error&&<div style={{color:C.error,fontSize:13,marginBottom:10}}>{error}</div>}
      {estado==="listo"&&resultado&&<div style={{background:"#D5F5E3",color:"#1E8449",borderRadius:8,padding:8,marginBottom:10,fontSize:13,fontWeight:700}}>✓ {resultado.archivo} subido a Drive y {resultado.cantidad} notificaciones eliminadas de la base de datos.</div>}
      <Btn ch={estado==="subiendo"?"Subiendo...":"📤 Exportar y eliminar del mes"} onClick={()=>setConfirmar(true)} color={C.marino} sm dis={estado==="subiendo"}/>
      {confirmar&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:14,padding:22,maxWidth:340,width:"100%"}}>
            <div style={{fontWeight:800,color:C.marino,fontSize:16,marginBottom:8}}>⚠️ ¿Exportar y eliminar?</div>
            <div style={{fontSize:13,color:C.texto,marginBottom:18}}>Se subirá un CSV con las notificaciones de {NOMBRES_MES[mesSel]} {anioSel} a tu Google Drive y luego se eliminarán DEFINITIVAMENTE de la base de datos.</div>
            <Btn ch="Sí, exportar y eliminar" onClick={exportarYBorrar} color={C.error} full/>
            <Btn ch="Cancelar" onClick={()=>setConfirmar(false)} color={C.texto} out full/>
          </div>
        </div>
      )}
    </Card>
  );
}

function Config({usuario,onLogout,historial,onVerHistorial}){
  const [users,setUsers]=useState(USUARIOS);
  const [editando,setEditando]=useState(null);
  const [nuevoPin,setNuevoPin]=useState("");
  const [mostrar,setMostrar]=useState(false);
  const [ok,setOk]=useState(false);
  const [foto,setFoto]=useState(null);
  const [subiendoFoto,setSubiendoFoto]=useState(false);
  const [errorFoto,setErrorFoto]=useState("");
  const [errorPin,setErrorPin]=useState("");
  const [guardandoPin,setGuardandoPin]=useState(false);
  const [editandoPropio,setEditandoPropio]=useState(false);
  const [nuevoPinPropio,setNuevoPinPropio]=useState("");
  const [errorPinPropio,setErrorPinPropio]=useState("");
  const [okPropio,setOkPropio]=useState(false);
  const [guardandoPropio,setGuardandoPropio]=useState(false);
  async function guardarPinPropio(){
    if(!nuevoPinPropio.trim())return;
    setGuardandoPropio(true);setErrorPinPropio("");
    const {error}=await sb.from("usuarios").update({pin:nuevoPinPropio}).eq("id",usuario.id);
    if(error){
      setErrorPinPropio("No se pudo guardar el PIN. Intenta de nuevo.");
    }else{
      setEditandoPropio(false);setNuevoPinPropio("");setOkPropio(true);setTimeout(()=>setOkPropio(false),2000);
    }
    setGuardandoPropio(false);
  }
  useEffect(()=>{
    (async()=>{
      const {data}=await sb.from("usuarios").select("foto").eq("id",usuario.id).single();
      if(data)setFoto(data.foto||null);
    })();
  },[usuario.id]);
  useEffect(()=>{
    if(usuario.rol!=="admin")return;
    (async()=>{
      const {data}=await sb.from("usuarios").select("*").order("id");
      if(data&&data.length)setUsers(data);
    })();
  },[usuario.rol]);
  async function guardarPin(id){
    if(!nuevoPin.trim())return;
    setGuardandoPin(true);setErrorPin("");
    const {error}=await sb.from("usuarios").update({pin:nuevoPin}).eq("id",id);
    if(error){
      setErrorPin("No se pudo guardar el PIN en Supabase. Intenta de nuevo.");
    }else{
      setUsers(prev=>prev.map(u=>u.id===id?{...u,pin:nuevoPin}:u));
      setEditando(null);setNuevoPin("");setOk(true);setTimeout(()=>setOk(false),2000);
    }
    setGuardandoPin(false);
  }
  function subirFoto(e){
    const file=e.target.files[0];
    if(!file)return;
    setSubiendoFoto(true);setErrorFoto("");
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=async()=>{
        const size=240;
        const canvas=document.createElement("canvas");
        canvas.width=size;canvas.height=size;
        const ctx=canvas.getContext("2d");
        const escala=Math.max(size/img.width,size/img.height);
        const w=img.width*escala,h=img.height*escala;
        ctx.drawImage(img,(size-w)/2,(size-h)/2,w,h);
        const base64=canvas.toDataURL("image/jpeg",0.85);
        const {error}=await sb.from("usuarios").update({foto:base64}).eq("id",usuario.id);
        if(error)setErrorFoto("No se pudo guardar la foto. Verifica que la columna 'foto' exista en la tabla usuarios (Supabase).");
        else setFoto(base64);
        setSubiendoFoto(false);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value="";
  }
  async function quitarFoto(){
    setSubiendoFoto(true);setErrorFoto("");
    const {error}=await sb.from("usuarios").update({foto:null}).eq("id",usuario.id);
    if(error)setErrorFoto("No se pudo quitar la foto.");
    else setFoto(null);
    setSubiendoFoto(false);
  }
  return (
    <div style={{padding:16,paddingBottom:80}}>
      <div style={{color:C.marino,fontWeight:800,fontSize:18,marginBottom:16}}>⚙️ Configuración</div>
      <Card>
        <div style={{fontWeight:700,color:C.marino,marginBottom:12}}>Mi cuenta</div>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
          <div style={{width:64,height:64,borderRadius:"50%",overflow:"hidden",background:C.gris,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`2px solid ${C.borde}`}}>
            {foto?<img src={foto} alt="Foto de perfil" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:20,fontWeight:800,color:C.marino}}>{usuario.nombre.split(" ").filter(Boolean).map(p=>p[0]).slice(0,2).join("")}</span>}
          </div>
          <div>
            <label style={{fontSize:12,cursor:subiendoFoto?"not-allowed":"pointer",color:C.cielo,fontWeight:700}}>
              {subiendoFoto?"Subiendo...":foto?"Cambiar foto":"Subir foto (opcional)"}
              <input type="file" accept="image/*" onChange={subirFoto} disabled={subiendoFoto} style={{display:"none"}}/>
            </label>
            {foto&&<div style={{marginTop:4}}><span onClick={subiendoFoto?undefined:quitarFoto} style={{fontSize:12,cursor:subiendoFoto?"not-allowed":"pointer",color:C.error,fontWeight:700}}>Quitar foto</span></div>}
            {errorFoto&&<div style={{marginTop:4,fontSize:11,color:C.error,maxWidth:180}}>{errorFoto}</div>}
          </div>
        </div>
        <div style={{fontSize:14,marginBottom:4}}><strong>{usuario.nombre}</strong></div>
