function HistorialCompleto({usuario,onVolver}){
  const porPagina=15;
  const [pagina,setPagina]=useState(1);
  const [items,setItems]=useState([]);
  const [total,setTotal]=useState(0);
  const [loading,setLoading]=useState(true);
  const [filtro,setFiltro]=useState("todas");
  const [confirmBorrarTodas,setConfirmBorrarTodas]=useState(false);
  const [borrandoTodas,setBorrandoTodas]=useState(false);
  useEffect(()=>{setPagina(1);},[filtro]);
  useEffect(()=>{
    let activo=true;
    setLoading(true);
    (async()=>{
      const ocultos=await idsOcultosPara(usuario.id);
      const desde=(pagina-1)*porPagina;
      const hasta=desde+porPagina-1;
      let q=sb.from("notificaciones").select("*",{count:"exact"}).eq("leida_historial",true);
      if(usuario.rol==="ingeniero") q=q.eq("para_usuario_id",usuario.id);
      if(usuario.rol==="admin") q=aplicarFiltroCategoria(q,filtro);
      q=excluirOcultas(q,ocultos);
      q=q.order("fecha",{ascending:false}).range(desde,hasta);
      const {data,count}=await q;
      if(!activo)return;
      setItems(data||[]);
      if(typeof count==="number")setTotal(count);
      setLoading(false);
    })();
    return ()=>{activo=false;};
  },[pagina,filtro,usuario.id,usuario.rol]);
  const totalPaginas=Math.max(1,Math.ceil(total/porPagina));
  async function eliminarNotif(id){
    await ocultarNotif(id,usuario.id);
    setItems(prev=>prev.filter(n=>n.id!==id));
    setTotal(t=>Math.max(0,t-1));
  }
  async function borrarTodas(){
    setBorrandoTodas(true);
    const ocultos=await idsOcultosPara(usuario.id);
    let q=sb.from("notificaciones").select("id").eq("leida_historial",true);
    if(usuario.rol==="ingeniero") q=q.eq("para_usuario_id",usuario.id);
    if(usuario.rol==="admin"&&filtro!=="todas") q=aplicarFiltroCategoria(q,filtro);
    q=excluirOcultas(q,ocultos);
    const {data}=await q;
    const idsAOcultar=(data||[]).map(r=>r.id);
    if(idsAOcultar.length>0){
      await sb.from("notificaciones_ocultas").insert(idsAOcultar.map(id=>({notificacion_id:id,usuario_id:usuario.id})));
    }
    setConfirmBorrarTodas(false);
    setBorrandoTodas(false);
    setItems([]);
    setTotal(0);
    setPagina(1);
  }
  return (
    <div style={{padding:16,paddingBottom:80}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <span onClick={onVolver} style={{cursor:"pointer",color:C.marino,fontWeight:700,fontSize:14}}>⬅ Volver</span>
        <div style={{color:C.marino,fontWeight:800,fontSize:18}}>📜 Historial de Notificaciones</div>
      </div>
      {usuario.rol==="admin"&&(
        <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
          {CATEGORIAS_NOTIF.map(c=>(
            <span key={c.id} onClick={()=>setFiltro(c.id)} style={{fontSize:12,cursor:"pointer",padding:"5px 12px",borderRadius:14,fontWeight:700,background:filtro===c.id?C.marino:C.blanco,color:filtro===c.id?"#fff":C.marino,border:`1.5px solid ${C.marino}`}}>{c.ico} {c.lbl}</span>
          ))}
        </div>
      )}
      <Card>
        {loading&&<div style={{fontSize:13,color:"#aaa"}}>Cargando...</div>}
        {!loading&&items.length===0&&<div style={{fontSize:13,color:"#aaa"}}>Sin notificaciones en esta categoría.</div>}
        {!loading&&items.map((n,i)=>(
          <div key={n.id||i} style={{fontSize:13,color:C.texto,padding:"8px 0",borderBottom:`1px solid ${C.borde}`}}>
            <div style={{color:"#aaa",fontSize:11,marginBottom:2}}>{new Date(n.fecha).toLocaleString("es-MX",{dateStyle:"short",timeStyle:"short"})}</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
              <div>{n.mensaje.includes("|")?n.mensaje.split("|").pop():n.mensaje}</div>
              <span onClick={()=>eliminarNotif(n.id)} style={{cursor:"pointer",color:C.error,fontSize:13,flexShrink:0}}>🗑️</span>
            </div>
          </div>
        ))}
      </Card>
      {totalPaginas>1&&(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4,marginBottom:12}}>
          <Btn ch="← Anterior" onClick={()=>setPagina(p=>Math.max(1,p-1))} color={C.marino} out sm dis={pagina<=1||loading}/>
          <div style={{fontSize:13,color:C.texto,fontWeight:600}}>Página {pagina} de {totalPaginas}</div>
          <Btn ch="Siguiente →" onClick={()=>setPagina(p=>Math.min(totalPaginas,p+1))} color={C.marino} out sm dis={pagina>=totalPaginas||loading}/>
        </div>
      )}
      {total>0&&!confirmBorrarTodas&&(
        <div style={{textAlign:"center"}}>
          <span onClick={()=>setConfirmBorrarTodas(true)} style={{fontSize:12,cursor:"pointer",color:C.error,fontWeight:700}}>
            🗑️ Borrar {usuario.rol==="admin"&&filtro!=="todas"?`categoría "${CATEGORIAS_NOTIF.find(c=>c.id===filtro)?.lbl}" de mi vista`:"todo mi historial (mi vista)"}
          </span>
        </div>
      )}
      {confirmBorrarTodas&&(
        <Card style={{border:`2px solid ${C.error}`}}>
          <div style={{fontSize:13,color:C.texto,marginBottom:12,fontWeight:600}}>
            Esto solo lo oculta de tu propia vista — el registro se conserva para el respaldo general. ¿Confirmas ocultar {usuario.rol==="admin"&&filtro!=="todas"?`todo el historial de "${CATEGORIAS_NOTIF.find(c=>c.id===filtro)?.lbl}"`:"todo tu historial"}?
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn ch={borrandoTodas?"Ocultando...":"Sí, ocultar"} onClick={borrarTodas} color={C.error} sm dis={borrandoTodas}/>
            <Btn ch="Cancelar" onClick={()=>setConfirmBorrarTodas(false)} color={C.texto} out sm dis={borrandoTodas}/>
          </div>
        </Card>
      )}
    </div>
  );
}

function Directorio({usuario}){
  const [tab,setTab]=useState("clientes");
  const [clientes,setClientes]=useState([]);
  const [usuarios,setUsuarios]=useState([]);
  const [busqueda,setBusqueda]=useState("");
  const [loading,setLoading]=useState(true);
  const [mostrarForm,setMostrarForm]=useState(false);
  const [nuevo,setNuevo]=useState({nombre:"",direccion:"",ciudad:"",telefono:"",email:""});
  const [confirmNuevo,setConfirmNuevo]=useState(false);
  const [confirmBorrar,setConfirmBorrar]=useState(null);
  const [editando,setEditando]=useState(null);
  const [edit,setEdit]=useState({nombre:"",direccion:"",ciudad:"",telefono:"",email:""});
  async function cargar(){
    setLoading(true);
    const {data:cli}=await sb.from("clientes").select("*").order("nombre");
    if(cli)setClientes(cli);
    const {data:us}=await sb.from("usuarios").select("id,nombre,usuario,rol").order("id");
    if(us)setUsuarios(us);
    setLoading(false);
  }
  useEffect(()=>{cargar();},[]);
  const clientesFiltrados=clientes.filter(c=>c.nombre.toLowerCase().includes(busqueda.toLowerCase()));
  async function agregarCliente(){
    await sb.from("clientes").insert({nombre:nuevo.nombre,direccion:nuevo.direccion||null,ciudad:nuevo.ciudad||null,telefono:nuevo.telefono||null,email:nuevo.email||null});
    await sb.from("notificaciones").insert({mensaje:`🆕 Nuevo cliente agregado al directorio: ${nuevo.nombre}`});
    setNuevo({nombre:"",direccion:"",ciudad:"",telefono:"",email:""});
    setMostrarForm(false);setConfirmNuevo(false);
    cargar();
  }
  async function borrarCliente(id){
    await sb.from("clientes").delete().eq("id",id);
    setConfirmBorrar(null);
    cargar();
  }
  function empezarEditar(c){
    setEditando(c.id);
    setEdit({nombre:c.nombre||"",direccion:c.direccion||"",ciudad:c.ciudad||"",telefono:c.telefono||"",email:c.email||""});
  }
  async function guardarEdicion(){
    await sb.from("clientes").update({nombre:edit.nombre,direccion:edit.direccion||null,ciudad:edit.ciudad||null,telefono:edit.telefono||null,email:edit.email||null}).eq("id",editando);
    setEditando(null);
    cargar();
  }

    <div style={{padding:16,paddingBottom:80}}>
      <div style={{color:C.marino,fontWeight:800,fontSize:18,marginBottom:16}}>📁 Directorio</div>
      <div style={{display:"flex",background:C.gris,borderRadius:10,padding:4,marginBottom:16}}>
        {[{id:"clientes",lbl:"Clientes"},{id:"usuarios",lbl:"Usuarios"}].map(t=>(
          <div key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,textAlign:"center",padding:"8px 2px",borderRadius:8,background:tab===t.id?C.marino:"transparent",color:tab===t.id?"#fff":C.texto,fontWeight:700,fontSize:13,cursor:"pointer"}}>{t.lbl}</div>
        ))}
      </div>
      {loading&&<div style={{textAlign:"center",color:C.texto,padding:20}}>Cargando...</div>}
      {!loading&&tab==="clientes"&&(
        <div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <input value={busqueda} onChange={e=>setBusqueda(e.target.value)} placeholder="Buscar cliente..." style={{flex:1,padding:"10px 12px",borderRadius:8,border:`1.5px solid ${C.borde}`,fontSize:14,outline:"none"}}/>
            <button onClick={()=>setMostrarForm(!mostrarForm)} style={{width:40,height:40,borderRadius:"50%",background:C.marino,color:"#fff",border:"none",fontSize:20,fontWeight:700,cursor:"pointer",lineHeight:1}}>+</button>
          </div>
          {mostrarForm&&(
            <Card>
              <Inp lbl="Nombre" val={nuevo.nombre} set={v=>setNuevo(p=>({...p,nombre:v}))} req ph="Nombre del cliente"/>
              <Inp lbl="Dirección" val={nuevo.direccion} set={v=>setNuevo(p=>({...p,direccion:v}))} ph="Calle, número, colonia"/>
              <Inp lbl="Ciudad" val={nuevo.ciudad} set={v=>setNuevo(p=>({...p,ciudad:v}))} ph="Ciudad, estado"/>
              <Inp lbl="Teléfono" val={nuevo.telefono} set={v=>setNuevo(p=>({...p,telefono:v}))} ph="10 dígitos" num/>
              <Inp lbl="Correo" val={nuevo.email} set={v=>setNuevo(p=>({...p,email:v}))} ph="correo@ejemplo.com" type="email"/>
              <div style={{display:"flex",gap:8}}>
                <Btn ch="Guardar" onClick={()=>setConfirmNuevo(true)} color={C.exito} sm dis={!nuevo.nombre.trim()}/>
                <Btn ch="Cancelar" onClick={()=>setMostrarForm(false)} color={C.texto} out sm/>
              </div>
            </Card>
          )}
          {clientesFiltrados.length===0&&<div style={{textAlign:"center",color:C.texto,padding:30,background:C.blanco,borderRadius:12}}>Sin clientes {busqueda?"que coincidan":"registrados"}.</div>}
          {clientesFiltrados.map(c=>(
            <Card key={c.id}>
              {editando===c.id?(
                <div>
                  <Inp lbl="Nombre" val={edit.nombre} set={v=>setEdit(p=>({...p,nombre:v}))} req ph="Nombre del cliente"/>
                  <Inp lbl="Dirección" val={edit.direccion} set={v=>setEdit(p=>({...p,direccion:v}))} ph="Calle, número, colonia"/>
                  <Inp lbl="Ciudad" val={edit.ciudad} set={v=>setEdit(p=>({...p,ciudad:v}))} ph="Ciudad, estado"/>
                  <Inp lbl="Teléfono" val={edit.telefono} set={v=>setEdit(p=>({...p,telefono:v}))} ph="10 dígitos" num/>
                  <Inp lbl="Correo" val={edit.email} set={v=>setEdit(p=>({...p,email:v}))} ph="correo@ejemplo.com" type="email"/>
                  <div style={{display:"flex",gap:8}}>
                    <Btn ch="✓ Guardar" onClick={guardarEdicion} color={C.exito} sm dis={!edit.nombre.trim()}/>
                    <Btn ch="Cancelar" onClick={()=>setEditando(null)} color={C.texto} out sm/>
                  </div>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>

                    <div style={{fontWeight:700,color:C.marino}}>{c.nombre}</div>

                    <div style={{fontSize:13,color:C.texto}}>{c.telefono} {c.email?`| ${c.email}`:""}</div>
                  </div>
                  <div style={{display:"flex",gap:10,flexShrink:0}}>
                    <span onClick={()=>empezarEditar(c)} style={{cursor:"pointer",color:C.cielo,fontSize:18}}>✏️</span>

                  </div>
                </div>
              )}
            </Card>
          ))}
        </div>
      )}
      {!loading&&tab==="usuarios"&&(
        <div>
          {usuarios.map(u=>(
            <Card key={u.id}>
              <div style={{fontWeight:700,color:C.marino}}>{u.nombre}</div>
              <div style={{fontSize:13,color:C.texto}}>@{u.usuario} · {u.rol==="admin"?"Administrador":u.rol==="supervisor"?"Supervisor":"Ingeniero"}</div>
            </Card>
          ))}
        </div>
      )}
      {confirmNuevo&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:14,padding:22,maxWidth:340,width:"100%"}}>
            <div style={{fontWeight:800,color:C.marino,fontSize:16,marginBottom:8}}>¿Agregar este cliente?</div>
            <div style={{fontSize:13,color:C.texto,marginBottom:18}}>{nuevo.nombre}</div>
            <Btn ch="Sí, agregar" onClick={agregarCliente} color={C.exito} full/>
            <Btn ch="Cancelar" onClick={()=>setConfirmNuevo(false)} color={C.texto} out full/>
          </div>
        </div>
      )}
      {confirmBorrar&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:14,padding:22,maxWidth:340,width:"100%"}}>
            <div style={{fontWeight:800,color:C.error,fontSize:16,marginBottom:8}}>⚠️ ¿Eliminar este cliente del directorio?</div>
            <div style={{fontSize:13,color:C.texto,marginBottom:18}}>{confirmBorrar.nombre} — no afecta las órdenes ya guardadas.</div>
            <Btn ch="Sí, eliminar" onClick={()=>borrarCliente(confirmBorrar.id)} color={C.error} full/>
            <Btn ch="Cancelar" onClick={()=>setConfirmBorrar(null)} color={C.texto} out full/>
          </div>
        </div>
      )}
    </div>
  );
}

function Pendientes({usuario}){
  const [tareas,setTareas]=useState([]);
  const [loading,setLoading]=useState(true);
  const [texto,setTexto]=useState("");
  const [fecha,setFecha]=useState("");
  const [confirmBorrar,setConfirmBorrar]=useState(null);
  const [editando,setEditando]=useState(null);
  const [editTexto,setEditTexto]=useState("");
  const [editFecha,setEditFecha]=useState("");
  async function cargar(){
    setLoading(true);
    const {data}=await sb.from("tareas_pendientes").select("*").eq("usuario_id",usuario.id).order("completado").order("fecha_recordatorio",{ascending:true,nullsFirst:false}).order("id",{ascending:false});
    if(data)setTareas(data);
    setLoading(false);
  }
  useEffect(()=>{cargar();},[]);
  async function agregar(){
    if(!texto.trim())return;
    await sb.from("tareas_pendientes").insert({usuario_id:usuario.id,texto:texto.trim(),fecha_recordatorio:fecha||null});
    setTexto("");setFecha("");
    cargar();
  }
  async function toggleCompletado(t){
    await sb.from("tareas_pendientes").update({completado:!t.completado}).eq("id",t.id);
    cargar();
  }
  function empezarEditar(t){
    setEditando(t.id);
    setEditTexto(t.texto);
    setEditFecha(t.fecha_recordatorio||"");
  }
  async function guardarEdicion(){
    if(!editTexto.trim())return;
    await sb.from("tareas_pendientes").update({texto:editTexto.trim(),fecha_recordatorio:editFecha||null}).eq("id",editando);
    setEditando(null);
    cargar();
  }
  async function borrar(id){
    await sb.from("tareas_pendientes").delete().eq("id",id);
    setConfirmBorrar(null);
    cargar();
  }
  const hoyStr=new Date().toISOString().slice(0,10);
  return (
    <div style={{padding:16,paddingBottom:80}}>
      <div style={{color:C.marino,fontWeight:800,fontSize:18,marginBottom:16}}>📝 Pendientes</div>
      <div style={{fontSize:12,color:"#aaa",marginBottom:14}}>Tu espacio personal — solo tú ves estas tareas.</div>
      <Card>
        <TA lbl="Nueva tarea" val={texto} set={setTexto} ph="Escribe algo que necesites hacer o agendar..."/>
        <Inp lbl="Recordatorio (opcional)" val={fecha} set={setFecha} type="date"/>
        <Btn ch="➕ Agregar" onClick={agregar} color={C.marino} full/>
      </Card>
      {loading&&<div style={{textAlign:"center",color:C.texto,padding:20}}>Cargando...</div>}
      {!loading&&tareas.length===0&&<div style={{textAlign:"center",color:"#aaa",padding:20}}>Sin pendientes por ahora.</div>}
      {!loading&&tareas.map(t=>{
        const vencida=t.fecha_recordatorio&&t.fecha_recordatorio<=hoyStr&&!t.completado;
        if(editando===t.id){
          return (
            <Card key={t.id}>
              <TA lbl="Editar tarea" val={editTexto} set={setEditTexto} ph="Escribe algo que necesites hacer o agendar..."/>
              <Inp lbl="Recordatorio (opcional)" val={editFecha} set={setEditFecha} type="date"/>
              <div style={{display:"flex",gap:8}}>
                <Btn ch="💾 Guardar" onClick={guardarEdicion} color={C.exito} sm/>
                <Btn ch="Cancelar" onClick={()=>setEditando(null)} color={C.texto} out sm/>
              </div>
            </Card>
          );
        }
        return (
          <Card key={t.id} style={{opacity:t.completado?0.5:1,background:vencida?C.amarillo:C.blanco}}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <input type="checkbox" checked={t.completado} onChange={()=>toggleCompletado(t)} style={{marginTop:3,width:18,height:18,accentColor:C.exito}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:14,color:C.texto,textDecoration:t.completado?"line-through":"none"}}>{t.texto}</div>
                {t.fecha_recordatorio&&<div style={{fontSize:12,color:vencida?"#7D6608":"#aaa",fontWeight:vencida?700:400,marginTop:4}}>{vencida?"⏰ ":"📅 "}{t.fecha_recordatorio}</div>}
              </div>
              <button onClick={()=>empezarEditar(t)} style={{background:"transparent",border:"none",color:C.marino,cursor:"pointer",fontSize:16}}>✏️</button>
              <button onClick={()=>setConfirmBorrar(t)} style={{background:"transparent",border:"none",color:C.error,cursor:"pointer",fontSize:16}}>🗑️</button>
            </div>
          </Card>
        );
      })}
      {confirmBorrar&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:14,padding:22,maxWidth:340,width:"100%"}}>
            <div style={{fontWeight:800,color:C.error,fontSize:16,marginBottom:8}}>⚠️ ¿Eliminar este pendiente?</div>
            <div style={{fontSize:13,color:C.texto,marginBottom:18}}>{confirmBorrar.texto}</div>
            <Btn ch="Sí, eliminar" onClick={()=>borrar(confirmBorrar.id)} color={C.error} full/>
            <Btn ch="Cancelar" onClick={()=>setConfirmBorrar(null)} color={C.texto} out full/>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [usuario,setUsuario]=useState(()=>{try{const u=sessionStorage.getItem("emb_u");return u?JSON.parse(u):null;}catch(e){return null;}});
  const [vista,setVista]=useState("dashboard");
  const [ordenes,setOrdenes]=useState([]);
  const [notifs,setNotifs]=useState([]);
  const [selec,setSelec]=useState(null);
  const [oe,setOe]=useState(null);
  const [loading,setLoading]=useState(false);
  const [historial,setHistorial]=useState([]);
  const [citas,setCitas]=useState([]);
  const [citaPrefill,setCitaPrefill]=useState(null);
  const [mantPopup,setMantPopup]=useState(null);
  const [confirmNoRealiza,setConfirmNoRealiza]=useState(false);
  const [pendientesOffline,setPendientesOffline]=useState(()=>leerPendientesOffline().length);
  async function intentarSincronizar(){
    if(!navigator.onLine)return;
    const {ok}=await sincronizarPendientesOffline();
    setPendientesOffline(leerPendientesOffline().length);
    if(ok>0&&usuario){cargarOrdenes();cargarNotifs(usuario.rol,usuario.id);}
  }
  useEffect(()=>{
    window.addEventListener("online",intentarSincronizar);
    return ()=>window.removeEventListener("online",intentarSincronizar);
  },[usuario]);
  const [sucia,setSucia]=useState(false);
  const [confirmSalida,setConfirmSalida]=useState(null);
  const guardarBorradorRef=useRef(null);
  function irAgendarDesdeOrden(orden){
    setCitaPrefill({
      cliente_nombre:orden.cliente_nombre,cliente_direccion:orden.cliente_dir,cliente_telefono:orden.cliente_tel,
      descripcion:`Mantenimiento preventivo — ${orden.equipo_tipo}`,fecha:orden.prev_proximo,orden_id:orden.id
    });
    setVista("agenda");
  }
  async function resolverMantPopup(accion){
    const orden=mantPopup.orden;
    if(accion==="agendar"){
      irAgendarDesdeOrden(orden);
    }else if(accion==="pendiente"){
      await sb.from("ordenes").update({mant_estado:"pendiente"}).eq("id",orden.id);
    }else if(accion==="no_realiza"){
      await marcarMantNoRealiza(orden);
      cargarNotifs(usuario.rol,usuario.id);cargarHistorial(usuario.rol,usuario.id);
    }
    setMantPopup(null);
  }
  function intentarNavegar(destino){
    if(sucia&&vista==="nueva_orden"){setConfirmSalida({destino});}
    else{destino();}
  }
  async function confGuardarYSalir(){
    if(guardarBorradorRef.current)await guardarBorradorRef.current();
    setSucia(false);
    const d=confirmSalida.destino;
    setConfirmSalida(null);
    d();
  }
  function confNoGuardar(){
    setSucia(false);
    const d=confirmSalida.destino;
    setConfirmSalida(null);
    d();
  }
  function pedirLogout(){intentarNavegar(logout);}
  useEffect(()=>{if(vista==="nueva_orden")setSucia(false);},[vista]);
  useEffect(()=>{setPendientesOffline(leerPendientesOffline().length);},[vista]);
  useEffect(()=>{
    function h(e){if(sucia){e.preventDefault();e.returnValue="";}}
    window.addEventListener("beforeunload",h);
    return ()=>window.removeEventListener("beforeunload",h);
  },[sucia]);
  async function cargarOrdenes(){setLoading(true);const {data}=await sb.from("ordenes").select("*").order("id",{ascending:false});if(data)setOrdenes(data);setLoading(false);}
  async function cargarCitas(){const {data}=await sb.from("citas").select("*").order("fecha").order("hora");if(data)setCitas(data);}
  async function cargarNotifs(rol,uid){
    const ocultos=await idsOcultosPara(uid);
    let q=sb.from("notificaciones").select("*").eq("leida",false).eq("leida_historial",false).order("fecha",{ascending:false});
    if(rol==="ingeniero") q=q.eq("para_usuario_id",uid);
    q=excluirOcultas(q,ocultos);
    const {data}=await q;
    if(data)setNotifs(data);
  }
  async function cargarHistorial(rol,uid){
    const ocultos=await idsOcultosPara(uid);
    let q=sb.from("notificaciones").select("*").eq("leida_historial",true).order("fecha",{ascending:false}).limit(5);
    if(rol==="ingeniero") q=q.eq("para_usuario_id",uid);
    q=excluirOcultas(q,ocultos);
    const {data}=await q;
    if(data)setHistorial(data);
  }
  useEffect(()=>{
    if(usuario){
      cargarOrdenes();cargarNotifs(usuario.rol,usuario.id);cargarHistorial(usuario.rol,usuario.id);cargarCitas();
      revisarEscalacionMantenimiento(usuario,setMantPopup);
      intentarSincronizar();
    }
  },[usuario]);
  function login(u){sessionStorage.setItem("emb_u",JSON.stringify(u));setUsuario(u);setVista("dashboard");setOe(null);setSelec(null);}
  function logout(){sessionStorage.removeItem("emb_u");setUsuario(null);}
  function refrescar(){cargarOrdenes();cargarNotifs(usuario.rol,usuario.id);cargarHistorial(usuario.rol,usuario.id);setSelec(null);setVista("ordenes");}
  function soloRecargar(){cargarOrdenes();cargarNotifs(usuario.rol,usuario.id);cargarHistorial(usuario.rol,usuario.id);}
  if(!usuario) return <Login onLogin={login}/>;
  const titulos={dashboard:"Inicio",nueva_orden:oe?"Editar Orden":"Nueva Orden",ordenes:"Órdenes",agenda:"Agenda",pendientes:"Pendientes",directorio:"Directorio",config:"Configuración",historial_completo:"Historial"};
  return (
    <div style={{minHeight:"100vh",background:C.gris}}>
      <Header titulo={titulos[vista]||"EMB"} usuario={usuario} onLogout={pedirLogout} onLogoClick={()=>intentarNavegar(()=>{setOe(null);setSelec(null);setVista("dashboard");})}/>
      <div style={{maxWidth:600,margin:"0 auto"}}>
        {vista==="dashboard"&&<Dashboard usuario={usuario} ordenes={ordenes} notifs={notifs} citas={citas} setVista={setVista} recargarNotifs={()=>{cargarNotifs(usuario.rol,usuario.id);cargarHistorial(usuario.rol,usuario.id);}} recargarCitas={cargarCitas} recargarOrdenes={cargarOrdenes} onAgendarOrden={irAgendarDesdeOrden} pendientesOffline={pendientesOffline} onSincronizar={intentarSincronizar}/>}
        {vista==="nueva_orden"&&<NuevaOrden usuario={usuario} onDone={refrescar} oe={oe} setSucia={setSucia} guardarBorradorRef={guardarBorradorRef} intentarSalir={intentarNavegar}/>}
        {vista==="ordenes"&&!selec&&<ListaOrdenes ordenes={ordenes} onSel={o=>setSelec(o)} loading={loading} onNueva={()=>{setOe(null);setVista("nueva_orden");}}/>}
        {vista==="ordenes"&&selec&&<DetalleOrden orden={selec} usuario={usuario} onVolver={()=>setSelec(null)} onRefrescar={soloRecargar} onEditar={o=>{setOe(o);setSelec(null);setVista("nueva_orden");}}/>}
        {vista==="agenda"&&<Agenda ordenes={ordenes} usuario={usuario} citas={citas} recargarCitas={cargarCitas} recargarOrdenes={cargarOrdenes} recargarNotifs={()=>{cargarNotifs(usuario.rol,usuario.id);cargarHistorial(usuario.rol,usuario.id);}} prefill={citaPrefill} limpiarPrefill={()=>setCitaPrefill(null)}/>}
        {vista==="pendientes"&&<Pendientes usuario={usuario}/>}
        {vista==="directorio"&&<Directorio usuario={usuario}/>}
        {vista==="config"&&<Config usuario={usuario} onLogout={pedirLogout} historial={historial} onVerHistorial={()=>setVista("historial_completo")}/>}
        {vista==="historial_completo"&&<HistorialCompleto usuario={usuario} onVolver={()=>setVista("config")}/>}
      </div>
      <Nav vista={vista} setVista={v=>intentarNavegar(()=>{setOe(null);setVista(v);setSelec(null);})} notifs={notifs.length}/>
      {confirmSalida&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:14,padding:22,maxWidth:340,width:"100%"}}>
            <div style={{fontWeight:800,color:C.marino,fontSize:16,marginBottom:8}}>⚠️ Tienes cambios sin guardar</div>
            <div style={{fontSize:13,color:C.texto,marginBottom:18}}>¿Qué deseas hacer con esta orden antes de salir?</div>
            <Btn ch="💾 Guardar y salir" onClick={confGuardarYSalir} color={C.exito} full/>
            <Btn ch="🚫 No guardar" onClick={confNoGuardar} color={C.error} out full/>
            <Btn ch="Cancelar" onClick={()=>setConfirmSalida(null)} color={C.texto} out full/>
          </div>
        </div>
      )}
      {mantPopup&&!confirmNoRealiza&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:14,padding:22,maxWidth:360,width:"100%"}}>
            <div style={{fontWeight:800,color:C.marino,fontSize:16,marginBottom:8}}>🔧 Próximo mantenimiento</div>
            <div style={{fontSize:13,color:C.texto,marginBottom:18}}>
              El mantenimiento de <strong>{mantPopup.orden.cliente_nombre}</strong> ({mantPopup.orden.equipo_tipo}) está programado para <strong>{mantPopup.orden.prev_proximo}</strong> ({mantPopup.etapa==="2sem"?"faltan 2 semanas":mantPopup.etapa==="1.5sem"?"faltan 1.5 semanas":"falta 1 semana"}). ¿Qué deseas hacer?
            </div>
            <Btn ch="📅 Agendar" onClick={()=>resolverMantPopup("agendar")} color={C.exito} full/>
            {mantPopup.etapa!=="1sem"&&<Btn ch="⏳ Pendiente" onClick={()=>resolverMantPopup("pendiente")} color={C.cielo} out full/>}
            {mantPopup.etapa!=="2sem"&&<Btn ch="🚫 No se realiza" onClick={()=>setConfirmNoRealiza(true)} color={C.error} out full/>}
          </div>
        </div>
      )}
      {mantPopup&&confirmNoRealiza&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:14,padding:22,maxWidth:360,width:"100%"}}>
            <div style={{fontWeight:800,color:C.error,fontSize:16,marginBottom:8}}>⚠️ ¿Confirmar que no se realizará?</div>
            <div style={{fontSize:13,color:C.texto,marginBottom:18}}>Se le avisará a {mantPopup.orden.cliente_nombre} que el mantenimiento no se realizará.</div>
            <Btn ch="Sí, confirmar" onClick={()=>{setConfirmNoRealiza(false);resolverMantPopup("no_realiza");}} color={C.error} full/>
            <Btn ch="Volver" onClick={()=>setConfirmNoRealiza(false)} color={C.texto} out full/>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}

</script>
</body>
</html>
